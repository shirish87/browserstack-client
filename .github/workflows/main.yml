# Pipeline:
#
#              ┌──────────────────────────────┐
#              │            build             │
#              │  (ubuntu: SDK + all binaries)│
#              └──────────┬───────────────────┘
#                         │
#               ┌─────────┴─────────┐
#               ▼                   ▼
#      ┌────────────────┐  ┌──────────────────┐
#      │   test-sdk     │  │    test-cli      │
#      │ (linux, lts)   │  │ ubuntu/mac/win   │
#      └───────┬────────┘  └────────┬─────────┘
#              └──────────┬─────────┘
#                         │  (both must pass)
#                         ▼
#                  ┌──────────────┐
#                  │  sonarqube   │  (non-blocking on quality
#                  │              │   metrics for now, but gates
#                  └──────┬───────┘   publish steps)
#                         │
#               ┌─────────┴──────────┐
#               ▼                    ▼
#      ┌──────────────────┐  ┌──────────────────┐
#      │  publish-docs    │  │  publish-npm     │
#      │  (main only)     │  │  (main only)     │
#      └──────────────────┘  └──────────────────┘
#
name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  VITE_BROWSERSTACK_USERNAME: "${{ secrets.VITE_BROWSERSTACK_USERNAME }}"
  VITE_BROWSERSTACK_KEY: "${{ secrets.VITE_BROWSERSTACK_KEY }}"
  BROWSERSTACK_USERNAME: "${{ secrets.VITE_BROWSERSTACK_USERNAME }}"
  BROWSERSTACK_KEY: "${{ secrets.VITE_BROWSERSTACK_KEY }}"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Build everything once ─────────────────────────────────────────────────
  build:
    name: "Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@5280c022466e8e5ea34ea201e2fda33875aeefdb # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: packages/cli/golang/go.mod
          cache-dependency-path: packages/cli/golang/go.mod

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-artifacts
          path: |
            packages/*/dist/**
            packages/cli/typescript/dist-binary/**
            packages/cli/golang/dist/**
          retention-days: 1

  # ── 2a. Full SDK test suite on Linux ─────────────────────────────────────────
  test-sdk:
    name: "Test SDK (linux, node.js lts)"
    runs-on: ubuntu-latest
    needs: [build]
    environment: BrowserStackEnv
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@5280c022466e8e5ea34ea201e2fda33875aeefdb # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts
          path: packages

      - name: Test
        run: pnpm test

  # ── 2b. CLI binary tests on each OS platform ─────────────────────────────────
  test-cli:
    name: "Test CLI (${{ matrix.os }})"
    needs: [build]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    environment: BrowserStackEnv
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@5280c022466e8e5ea34ea201e2fda33875aeefdb # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts
          path: packages

      - name: Test CLI
        run: pnpm test -- --project cli -t "LocalCLI"

  # ── 3. SonarQube scan ────────────────────────────────────────────────────────
  sonarqube:
    name: "SonarQube Scan"
    runs-on: ubuntu-latest
    needs: [test-sdk, test-cli]
    services:
      sonarqube:
        image: sonarqube:community
        ports:
          - 9000:9000
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@5280c022466e8e5ea34ea201e2fda33875aeefdb # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts
          path: packages

      - name: Coverage
        run: pnpm coverage

      - name: Wait for SonarQube to be ready
        run: |
          until curl -s -f http://localhost:9000/api/system/status | grep -q '"status":"UP"'; do
            sleep 5
          done

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7
        with:
          args: >
            -Dsonar.host.url=http://localhost:9000
            -Dsonar.login=admin
            -Dsonar.password=admin

      - name: Export SonarQube results
        if: always()
        run: |
          curl -u admin:admin "http://localhost:9000/api/issues/search?componentKeys=browserstack-client&ps=500" > sonarqube-issues.json
          curl -u admin:admin "http://localhost:9000/api/measures/component?component=browserstack-client&metricKeys=bugs,vulnerabilities,code_smells,coverage" > sonarqube-summary.json

      - name: Upload SonarQube results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sonarqube-reports
          path: |
            sonarqube-issues.json
            sonarqube-summary.json

  # ── 4. Publish docs (main branch only) ───────────────────────────────────────
  publish-docs:
    name: "Publish Docs"
    runs-on: ubuntu-latest
    needs: [sonarqube]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@5280c022466e8e5ea34ea201e2fda33875aeefdb # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts
          path: packages

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Build docs
        run: pnpm docs:build

      - name: Fix permissions
        run: |
          chmod -c -R +rX "docs/.vitepress/dist/" | while read line; do
            echo "::warning title=Invalid file permissions automatically fixed::$line"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: "docs/.vitepress/dist/"

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

  # ── 5. Publish to npm (main branch only) ─────────────────────────────────────
  publish-npm:
    name: "Publish npm"
    runs-on: ubuntu-latest
    needs: [sonarqube]
    if: github.event_name != 'pull_request'
    environment: BrowserStackEnv
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@5280c022466e8e5ea34ea201e2fda33875aeefdb # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts
          path: packages

      - name: Publish
        run: |
          VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          if echo "$VERSION" | grep -qE '\-(alpha|beta|rc)([.\d]|$)'; then
            TAG="next"
          else
            TAG="latest"
          fi
          echo "Publishing version $VERSION with tag $TAG"
          pnpm publish -r --tag $TAG --no-git-checks
        env:
          NODE_AUTH_TOKEN: "${{ secrets.NPM_PUBLISH_TOKEN }}"
