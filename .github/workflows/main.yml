# Pipeline:
#
#    ┌──────────────────────────────────────────┐
#    │                  build                   │
#    │  (ubuntu: SDK + all binaries + SonarQube)│
#    └──────────────────┬───────────────────────┘
#                       │
#                       ▼
#            ┌──────────────────────────────┐
#            │          test-sdk            │
#            │  (linux: SDK + CLI, all      │
#            │   projects incl. cli binary) │
#            └──────────┬───────────────────┘
#                       │
#             ┌─────────┴─────────┐
#             ▼                   ▼
#    ┌────────────────┐  ┌────────────────┐
#    │   test-cli     │  │   test-cli     │
#    │   (macos)      │  │   (windows)    │
#    └───────┬────────┘  └────────┬───────┘
#            └──────────┬─────────┘
#                       │  (both must pass)
#                       ▼
#             ┌─────────┴──────────┐
#             ▼                    ▼
#    ┌──────────────────┐  ┌──────────────────┐
#    │  publish-docs    │  │  publish-npm     │
#    │  (main only)     │  │  (main only)     │
#    └──────────────────┘  └──────────────────┘
#
name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  VITE_BROWSERSTACK_USERNAME: "${{ secrets.VITE_BROWSERSTACK_USERNAME }}"
  VITE_BROWSERSTACK_KEY: "${{ secrets.VITE_BROWSERSTACK_KEY }}"
  BROWSERSTACK_USERNAME: "${{ secrets.VITE_BROWSERSTACK_USERNAME }}"
  BROWSERSTACK_KEY: "${{ secrets.VITE_BROWSERSTACK_KEY }}"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # CI runners (especially macOS) can take longer than the 20s default to
  # establish a BrowserStack Local tunnel. This raises the spawnSync /
  # context timeout for daemon commands only, without changing the SDK default.
  BROWSERSTACK_LOCAL_COMMAND_TIMEOUT_MS: "55000"

jobs:
  # ── 1. Build everything once + SonarQube scan ────────────────────────────────
  build:
    name: "Build"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: packages/cli/golang/go.mod
          cache-dependency-path: packages/cli/golang/go.mod

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-artifacts
          path: |
            packages/*/dist/**
            packages/*/*/dist/**
            packages/cli/typescript/dist-binary/**
            packages/cli/typescript/src/*.generated.ts
            packages/cli/golang/dist/**
          retention-days: 1

      - name: Start Lean SonarQube
        run: docker compose -f scripts/docker-compose.sonarqube.yml up -d --build

      - name: Wait for SonarQube to be ready
        run: |
          echo "Waiting for SonarQube to be operational..."
          for i in {1..60}; do
            if curl -s -f http://localhost:9000/api/system/status | grep -q '"status":"UP"'; then
              if docker logs sonarqube-local 2>&1 | grep -q "SonarQube is operational"; then
                echo "SonarQube is READY!"
                break
              fi
            fi
            sleep 5
          done

      - name: SonarQube Scan
        run: |
          # 1. Generate strong session password with special characters
          SONAR_ADMIN_PASS=$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 20)"!A1"
          
          # 2. Change default password to enable API access
          echo "Securing SonarQube..."
          curl -s -u admin:admin -X POST "http://localhost:9000/api/users/change_password?login=admin&previousPassword=admin&password=$SONAR_ADMIN_PASS"
          
          # 3. Generate ephemeral scan token
          TOKEN_JSON=$(curl -s -u admin:$SONAR_ADMIN_PASS -X POST "http://localhost:9000/api/user_tokens/generate?name=scanner-token")
          SONAR_TOKEN=$(echo $TOKEN_JSON | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
          
          # 4. Disable forceAuthentication for Playwright
          curl -s -u admin:$SONAR_ADMIN_PASS -X POST "http://localhost:9000/api/settings/set?key=sonar.forceAuthentication&value=false"
          
          echo "Running Scan..."
          docker run --rm \
            --network="host" \
            -v "$(pwd):/usr/src" \
            sonarsource/sonar-scanner-cli \
            -Dsonar.projectKey=browserstack-client \
            -Dsonar.sources=. \
            -Dsonar.tests=. \
            -Dsonar.test.inclusions="**/*.test.ts,**/*.spec.ts,**/*_test.go,**/__tests__/**,**/test/**" \
            -Dsonar.exclusions="**/node_modules/**,**/dist/**,**/dist-binary/**,**/generated/**,**/*.generated.ts" \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.token=$SONAR_TOKEN
          
          # Export for next steps
          echo "SONAR_ADMIN_PASS=$SONAR_ADMIN_PASS" >> $GITHUB_ENV
          echo "SONAR_TOKEN_LOCAL=$SONAR_TOKEN" >> $GITHUB_ENV

      - name: Export SonarQube results
        if: always()
        run: |
          # Wait for CE to process the report
          sleep 20
          curl -u admin:${{ env.SONAR_ADMIN_PASS }} "http://localhost:9000/api/issues/search?componentKeys=browserstack-client&ps=500" > sonarqube-issues.json
          curl -u admin:${{ env.SONAR_ADMIN_PASS }} "http://localhost:9000/api/measures/component?component=browserstack-client&metricKeys=bugs,vulnerabilities,code_smells,coverage" > sonarqube-summary.json

      - name: Install LibreOffice
        if: always()
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice-writer libreoffice-calc --no-install-recommends

      - name: Generate CNES Report
        if: always()
        run: |
          # 1. Wait for SonarQube to finish processing the analysis
          echo "Waiting for SonarQube analysis processing to complete..."
          for i in $(seq 1 30); do
            TASK_STATUS=$(curl -s -u admin:${{ env.SONAR_ADMIN_PASS }} \
              "http://localhost:9000/api/ce/component?component=browserstack-client" \
              | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4)
            if [ "$TASK_STATUS" = "SUCCESS" ]; then echo "Analysis processing complete."; break; fi
            printf "."; sleep 5
          done

          # 2. Generate report using Java inside the already running SonarQube container
          docker exec -u sonarqube sonarqube-local sh -c "
            curl -L -s -o /tmp/cnes.jar https://github.com/cnescatlab/sonar-cnes-report/releases/download/5.0.4/sonar-cnes-report-5.0.4.jar
            java -Duser.home=/tmp -jar /tmp/cnes.jar \
              -s http://localhost:9000 \
              -t ${{ env.SONAR_TOKEN_LOCAL }} \
              -p browserstack-client \
              -o /opt/sonarqube/temp
          "
          
          # 2. Copy the reports out to the runner
          mkdir -p sonarqube-reports
          docker cp sonarqube-local:/opt/sonarqube/temp/. sonarqube-reports/
          
          # 3. Convert DOCX to PDF
          echo "Converting DOCX report to PDF..."
          DOCX_FILE=$(ls sonarqube-reports/*-analysis-report.docx | head -n 1)
          if [ -f "$DOCX_FILE" ]; then
            libreoffice --headless --convert-to pdf "$DOCX_FILE" --outdir sonarqube-reports/
          fi
          
          # 4. Shutdown SonarQube
          docker compose -f scripts/docker-compose.sonarqube.yml down -v

      - name: Add Report to Summary
        if: always()
        run: |
          REPORT_FILE=$(ls sonarqube-reports/*-analysis-report.md | head -n 1)
          if [ -f "$REPORT_FILE" ]; then
            echo "## SonarQube Analysis Report" >> $GITHUB_STEP_SUMMARY
            cat "$REPORT_FILE" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload SonarQube results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sonarqube-reports
          path: sonarqube-reports/

  # ── 2a. Full test suite on Linux (SDK + CLI) ─────────────────────────────────
  test-sdk:
    name: "Test (linux, node.js lts)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    environment: BrowserStackEnv
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: packages/cli/golang/go.mod
          cache-dependency-path: packages/cli/golang/go.mod

      - name: Install dependencies
        run: pnpm install

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts
          path: packages

      - name: Restore binary permissions
        run: |
          chmod +x packages/cli/typescript/dist-binary/browserstack-client-ts-linux-*
          chmod +x packages/cli/golang/dist/browserstack-client-linux-*

      - name: Test
        run: pnpm test

  # ── 2b. CLI binary tests on macOS and Windows ────────────────────────────────
  test-cli:
    name: "Test CLI (${{ matrix.os }})"
    needs: [build, test-sdk]
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        include:
          # Node.js 24 has native crash regressions on Windows (STATUS_STACK_BUFFER_OVERRUN
          # and STATUS_ACCESS_VIOLATION / exit 3221226505) when spawning child Node processes
          # that make HTTPS calls. lts/* now resolves to Node 24 which is affected.
          # Pin Windows to Node 22 LTS which is stable; macOS runs lts/*.
          - os: windows-latest
            node-version: "22"
          - os: macos-latest
            node-version: "lts/*"
    runs-on: ${{ matrix.os }}
    environment: BrowserStackEnv
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts
          path: packages

      - name: Restore binary permissions
        if: runner.os != 'Windows'
        run: |
          chmod +x packages/cli/typescript/dist-binary/browserstack-client-ts-darwin-*
          chmod +x packages/cli/golang/dist/browserstack-client-darwin-*

      - name: Test CLI
        run: pnpm test -- --project cli -t "LocalCLI"

  # ── 3. Publish docs (main branch only) ───────────────────────────────────────
  publish-docs:
    name: "Publish Docs"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test-sdk, test-cli]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts
          path: packages

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Build docs
        run: pnpm docs:build

      - name: Fix permissions
        run: |
          chmod -c -R +rX "docs/.vitepress/dist/" | while read line; do
            echo "::warning title=Invalid file permissions automatically fixed::$line"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: "docs/.vitepress/dist/"

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

  # ── 5. Publish to npm (main branch only) ─────────────────────────────────────
  publish-npm:
    name: "Publish npm"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test-sdk, test-cli]
    if: github.event_name != 'pull_request'
    environment: BrowserStackEnv
    permissions:
      contents: read
    outputs:
      published: ${{ steps.check-version.outputs.already_published == 'false' }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Get version
        id: get-version
        run: |
          VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts
          path: packages

      - name: Check if version already exists
        id: check-version
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          if npm view @dot-slash/browserstack-cli@$VERSION version >/dev/null 2>&1; then
            echo "already_published=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION is already published."
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION is new."
          fi

      - name: Publish
        if: steps.check-version.outputs.already_published == 'false'
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          if echo "$VERSION" | grep -qE '\-(alpha|beta|rc)([.\d]|$)'; then
            TAG="next"
          else
            TAG="latest"
          fi
          echo "Publishing version $VERSION with tag $TAG"
          pnpm publish -r --tag $TAG --no-git-checks
        env:
          NODE_AUTH_TOKEN: "${{ secrets.NPM_PUBLISH_TOKEN }}"

  # ── 6. Create GitHub Release (main branch only, if published) ────────────────
  release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [publish-npm]
    if: needs.publish-npm.outputs.published == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts
          path: packages

      - name: Pack SDK tarballs
        run: |
          mkdir -p release-assets/sdk
          for pkg in automate app-automate screenshots local-testing local-testing-binary accessibility test-management test-reporting; do
            pnpm --filter "@dot-slash/browserstack-$pkg" pack --pack-destination release-assets/sdk
          done

      - name: Organize binaries
        run: |
          mkdir -p release-assets/go
          mkdir -p release-assets/ts
          cp packages/cli/golang/dist/browserstack-client-* release-assets/go/
          cp packages/cli/typescript/dist-binary/browserstack-client-ts-* release-assets/ts/
          chmod +x release-assets/go/browserstack-client-linux-*
          chmod +x release-assets/go/browserstack-client-darwin-*
          chmod +x release-assets/ts/browserstack-client-ts-linux-*
          chmod +x release-assets/ts/browserstack-client-ts-darwin-*

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ needs.publish-npm.outputs.version }}"
          TAG="v$VERSION"
          PREV_TAG=$(git tag --sort=-version:refname | grep "^v" | grep -v "^${TAG}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" -- . ':!.github')
          else
            CHANGELOG=$(git log --pretty=format:"- %s" "HEAD" -- . ':!.github')
          fi
          {
            DELIMITER="RELEASE_NOTES_$(openssl rand -hex 8)"
            echo "notes<<${DELIMITER}"
            echo "## Go CLI — native binaries (no Node.js required)"
            echo ""
            echo "| Platform | Architecture | File |"
            echo "|----------|-------------|------|"
            echo "| Linux | x64 | \`browserstack-client-linux-amd64\` |"
            echo "| Linux | arm64 | \`browserstack-client-linux-arm64\` |"
            echo "| macOS | x64 | \`browserstack-client-darwin-amd64\` |"
            echo "| macOS | arm64 (M1/M2) | \`browserstack-client-darwin-arm64\` |"
            echo "| Windows | x64 | \`browserstack-client-windows-amd64.exe\` |"
            echo ""
            echo "## TypeScript CLI — Node.js bundled"
            echo ""
            echo "| Platform | Architecture | File |"
            echo "|----------|-------------|------|"
            echo "| Linux | x64 | \`browserstack-client-ts-linux-amd64\` |"
            echo "| Linux | arm64 | \`browserstack-client-ts-linux-arm64\` |"
            echo "| macOS | x64 | \`browserstack-client-ts-darwin-amd64\` |"
            echo "| macOS | arm64 (M1/M2) | \`browserstack-client-ts-darwin-arm64\` |"
            echo "| Windows | x64 | \`browserstack-client-ts-windows-amd64.exe\` |"
            echo ""
            echo "## SDK Packages"
            echo ""
            echo "Install directly from this release (no npm registry required):"
            echo "\`\`\`sh"
            echo "# Example: install the Automate SDK"
            echo "npm install https://github.com/shirish87/browserstack-client/releases/download/${TAG}/browserstack-client-automate-${VERSION}.tgz"
            echo "\`\`\`"
            echo ""
            echo "Available packages: \`automate\`, \`app-automate\`, \`screenshots\`, \`local-testing\`, \`local-testing-binary\`, \`accessibility\`, \`test-management\`, \`test-reporting\`"
            echo ""
            echo "## Changes"
            echo ""
            echo "${CHANGELOG}"
            echo "${DELIMITER}"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ steps.notes.outputs.notes }}
        run: |
          VERSION="${{ needs.publish-npm.outputs.version }}"
          TAG="v$VERSION"
          IS_PRE=$(echo "$TAG" | grep -qE '\-(alpha|beta|rc)([.\d]|$)' && echo "true" || echo "false")
          
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists, updating notes and assets..."
            gh release edit "$TAG" --notes "$RELEASE_NOTES" $( [ "$IS_PRE" = "true" ] && echo "--prerelease" )
            gh release upload "$TAG" --clobber \
              release-assets/go/browserstack-client-* \
              release-assets/ts/browserstack-client-ts-* \
              release-assets/sdk/*.tgz
          else
            echo "Creating new release $TAG..."
            gh release create "$TAG" \
              --title "Release $TAG" \
              --notes "$RELEASE_NOTES" \
              $( [ "$IS_PRE" = "true" ] && echo "--prerelease" ) \
              release-assets/go/browserstack-client-* \
              release-assets/ts/browserstack-client-ts-* \
              release-assets/sdk/*.tgz
          fi
