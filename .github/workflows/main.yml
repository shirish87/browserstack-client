# Pipeline:
#
#    ┌──────────────────────────────────────────┐
#    │                  build                   │
#    │  (ubuntu: SDK + all binaries + SonarQube)│
#    └──────────────────┬───────────────────────┘
#                       │
#                       ▼
#            ┌──────────────────────────────┐
#            │          test-sdk            │
#            │  (linux: SDK + CLI, all      │
#            │   projects incl. cli binary) │
#            └──────────┬───────────────────┘
#                       │
#             ┌─────────┴─────────┐
#             ▼                   ▼
#    ┌────────────────┐  ┌────────────────┐
#    │   test-cli     │  │   test-cli     │
#    │   (macos)      │  │   (windows)    │
#    └───────┬────────┘  └────────┬───────┘
#            └──────────┬─────────┘
#                       │  (both must pass)
#                       ▼
#             ┌─────────┴──────────┐
#             ▼                    ▼
#    ┌──────────────────┐  ┌──────────────────┐
#    │  publish-docs    │  │  publish-npm     │
#    │  (main only)     │  │  (main only)     │
#    └──────────────────┘  └──────────────────┘
#
name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  VITE_BROWSERSTACK_USERNAME: "${{ secrets.VITE_BROWSERSTACK_USERNAME }}"
  VITE_BROWSERSTACK_KEY: "${{ secrets.VITE_BROWSERSTACK_KEY }}"
  BROWSERSTACK_USERNAME: "${{ secrets.VITE_BROWSERSTACK_USERNAME }}"
  BROWSERSTACK_KEY: "${{ secrets.VITE_BROWSERSTACK_KEY }}"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Build everything once + SonarQube scan ────────────────────────────────
  build:
    name: "Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: packages/cli/golang/go.mod
          cache-dependency-path: packages/cli/golang/go.mod

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-artifacts
          path: |
            packages/*/dist/**
            packages/*/*/dist/**
            packages/cli/typescript/dist-binary/**
            packages/cli/typescript/src/*.generated.ts
            packages/cli/golang/dist/**
          retention-days: 1

      - name: Start Lean SonarQube
        run: |
          # 1. Prepare Lean Extensions (TS, JS, Go only)
          mkdir -p scripts/.sonar-lean-plugins
          docker run --rm -v "$(pwd)/scripts/.sonar-lean-plugins:/target" sonarqube:community sh -c "
            cp /opt/sonarqube/lib/extensions/sonar-javascript-plugin-*.jar /target/
            cp /opt/sonarqube/lib/extensions/sonar-go-plugin-*.jar /target/
            cp /opt/sonarqube/lib/extensions/sonar-text-plugin-*.jar /target/
          "
          
          # 2. Start via Docker Compose
          docker compose -f scripts/docker-compose.sonarqube.yml up -d

      - name: Wait for SonarQube to be ready
        run: |
          echo "Waiting for SonarQube to be operational..."
          for i in {1..60}; do
            if curl -s -f http://localhost:9000/api/system/status | grep -q '"status":"UP"'; then
              if docker logs sonarqube-local 2>&1 | grep -q "SonarQube is operational"; then
                echo "SonarQube is READY!"
                break
              fi
            fi
            sleep 5
          done

      - name: SonarQube Scan
        run: |
          # 1. Generate strong session password with special characters
          SONAR_ADMIN_PASS=$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 20)"!A1"
          
          # 2. Change default password to enable API access
          echo "Securing SonarQube..."
          curl -s -u admin:admin -X POST "http://localhost:9000/api/users/change_password?login=admin&previousPassword=admin&password=$SONAR_ADMIN_PASS"
          
          # 3. Generate ephemeral scan token
          TOKEN_JSON=$(curl -s -u admin:$SONAR_ADMIN_PASS -X POST "http://localhost:9000/api/user_tokens/generate?name=scanner-token")
          SONAR_TOKEN=$(echo $TOKEN_JSON | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
          
          # 4. Disable forceAuthentication for Playwright
          curl -s -u admin:$SONAR_ADMIN_PASS -X POST "http://localhost:9000/api/settings/set?key=sonar.forceAuthentication&value=false"
          
          echo "Running Scan..."
          docker run --rm \
            --network="host" \
            -v "$(pwd):/usr/src" \
            sonarsource/sonar-scanner-cli \
            -Dsonar.projectKey=browserstack-client \
            -Dsonar.sources=. \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.token=$SONAR_TOKEN
          
          # Export for next steps
          echo "SONAR_ADMIN_PASS=$SONAR_ADMIN_PASS" >> $GITHUB_ENV
          echo "SONAR_TOKEN_LOCAL=$SONAR_TOKEN" >> $GITHUB_ENV

      - name: Export SonarQube results
        if: always()
        run: |
          # Wait for CE to process the report
          sleep 20
          curl -u admin:${{ env.SONAR_ADMIN_PASS }} "http://localhost:9000/api/issues/search?componentKeys=browserstack-client&ps=500" > sonarqube-issues.json
          curl -u admin:${{ env.SONAR_ADMIN_PASS }} "http://localhost:9000/api/measures/component?component=browserstack-client&metricKeys=bugs,vulnerabilities,code_smells,coverage" > sonarqube-summary.json

      - name: Install LibreOffice
        if: always()
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice-writer libreoffice-calc --no-install-recommends

      - name: Generate CNES Report
        if: always()
        run: |
          # 1. Generate report using Java inside the already running SonarQube container
          docker exec sonarqube-local sh -c "
            curl -L -s -o /tmp/cnes.jar https://github.com/cnescatlab/sonar-cnes-report/releases/download/5.0.4/sonar-cnes-report-5.0.4.jar
            java -jar /tmp/cnes.jar \
              -s http://localhost:9000 \
              -t ${{ env.SONAR_TOKEN_LOCAL }} \
              -p browserstack-client \
              -o /opt/sonarqube/temp
          "
          
          # 2. Copy the reports out to the runner
          mkdir -p sonarqube-reports
          docker cp sonarqube-local:/opt/sonarqube/temp/. sonarqube-reports/
          
          # 3. Convert DOCX to PDF
          echo "Converting DOCX report to PDF..."
          DOCX_FILE=$(ls sonarqube-reports/*-analysis-report.docx | head -n 1)
          if [ -f "$DOCX_FILE" ]; then
            libreoffice --headless --convert-to pdf "$DOCX_FILE" --outdir sonarqube-reports/
          fi
          
          # 4. Shutdown SonarQube
          docker compose -f scripts/docker-compose.sonarqube.yml down -v

      - name: Add Report to Summary
        if: always()
        run: |
          REPORT_FILE=$(ls sonarqube-reports/*-analysis-report.md | head -n 1)
          if [ -f "$REPORT_FILE" ]; then
            echo "## SonarQube Analysis Report" >> $GITHUB_STEP_SUMMARY
            cat "$REPORT_FILE" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload SonarQube results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sonarqube-reports
          path: sonarqube-reports/

  # ── 2a. Full test suite on Linux (SDK + CLI) ─────────────────────────────────
  test-sdk:
    name: "Test (linux, node.js lts)"
    runs-on: ubuntu-latest
    needs: [build]
    environment: BrowserStackEnv
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: packages/cli/golang/go.mod
          cache-dependency-path: packages/cli/golang/go.mod

      - name: Install dependencies
        run: pnpm install

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts
          path: packages

      - name: Restore binary permissions
        run: |
          chmod +x packages/cli/typescript/dist-binary/browserstack-client-ts-linux-*
          chmod +x packages/cli/golang/dist/browserstack-client-linux-*

      - name: Test
        run: pnpm test

  # ── 2b. CLI binary tests on macOS and Windows ────────────────────────────────
  test-cli:
    name: "Test CLI (${{ matrix.os }})"
    needs: [build, test-sdk]
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    environment: BrowserStackEnv
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts
          path: packages

      - name: Restore binary permissions
        if: runner.os != 'Windows'
        run: |
          chmod +x packages/cli/typescript/dist-binary/browserstack-client-ts-darwin-*
          chmod +x packages/cli/golang/dist/browserstack-client-darwin-*

      - name: Test CLI
        run: pnpm test -- --project cli -t "LocalCLI"

  # ── 3. Publish docs (main branch only) ───────────────────────────────────────
  publish-docs:
    name: "Publish Docs"
    runs-on: ubuntu-latest
    needs: [test-sdk, test-cli]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts
          path: packages

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Build docs
        run: pnpm docs:build

      - name: Fix permissions
        run: |
          chmod -c -R +rX "docs/.vitepress/dist/" | while read line; do
            echo "::warning title=Invalid file permissions automatically fixed::$line"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: "docs/.vitepress/dist/"

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

  # ── 5. Publish to npm (main branch only) ─────────────────────────────────────
  publish-npm:
    name: "Publish npm"
    runs-on: ubuntu-latest
    needs: [test-sdk, test-cli]
    if: github.event_name != 'pull_request'
    environment: BrowserStackEnv
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts
          path: packages

      - name: Publish
        run: |
          VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          if echo "$VERSION" | grep -qE '\-(alpha|beta|rc)([.\d]|$)'; then
            TAG="next"
          else
            TAG="latest"
          fi
          echo "Publishing version $VERSION with tag $TAG"
          pnpm publish -r --tag $TAG --no-git-checks
        env:
          NODE_AUTH_TOKEN: "${{ secrets.NPM_PUBLISH_TOKEN }}"
