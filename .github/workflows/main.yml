name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  VITE_BROWSERSTACK_USERNAME: "${{ secrets.VITE_BROWSERSTACK_USERNAME }}"
  VITE_BROWSERSTACK_KEY: "${{ secrets.VITE_BROWSERSTACK_KEY }}"
  BROWSERSTACK_USERNAME: "${{ secrets.VITE_BROWSERSTACK_USERNAME }}"
  BROWSERSTACK_KEY: "${{ secrets.VITE_BROWSERSTACK_KEY }}"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-cli:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    name: "node.js lts ${{ matrix.os }}"
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}
    environment: BrowserStackEnv
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@5280c022466e8e5ea34ea201e2fda33875aeefdb # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build:types && pnpm build:ts && pnpm run build:cli:ts

      - name: Test CLI
        run: pnpm test -- --project cli -t "LocalCLI"

  test-node-lts:
    name: "node.js lts"
    runs-on: ubuntu-latest
    needs: [test-cli]
    environment: BrowserStackEnv
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@5280c022466e8e5ea34ea201e2fda33875aeefdb # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build:types && pnpm build:ts && pnpm run build:cli:ts

      - name: Test
        run: pnpm test

  test-node-v18:
    name: "node.js v18"
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs: [test-node-lts]
    environment: BrowserStackEnv
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@5280c022466e8e5ea34ea201e2fda33875aeefdb # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "18"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build:types && pnpm build:ts && pnpm run build:cli:ts

      - name: Test
        run: pnpm test

  sonarqube:
    name: SonarQube Ephemeral Scan
    runs-on: ubuntu-latest
    needs: [test-node-lts]
    services:
      sonarqube:
        image: sonarqube:community
        ports:
          - 9000:9000
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@5280c022466e8e5ea34ea201e2fda33875aeefdb # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build and Coverage
        run: pnpm build:types && pnpm build:ts && pnpm run build:cli:ts && pnpm coverage

      - name: Wait for SonarQube to be ready
        run: |
          echo "Waiting for SonarQube to start..."
          until curl -s -f http://localhost:9000/api/system/status | grep -q '"status":"UP"'; do
            sleep 5
          done
          echo "SonarQube is UP"

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7
        with:
          args: >
            -Dsonar.host.url=http://localhost:9000
            -Dsonar.login=admin
            -Dsonar.password=admin

      - name: Export SonarQube Issues
        if: always()
        run: |
          curl -u admin:admin "http://localhost:9000/api/issues/search?componentKeys=browserstack-client&ps=500" > sonarqube-issues.json
          curl -u admin:admin "http://localhost:9000/api/measures/component?component=browserstack-client&metricKeys=bugs,vulnerabilities,code_smells,coverage" > sonarqube-summary.json

      - name: Upload SonarQube Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sonarqube-reports
          path: |
            sonarqube-issues.json
            sonarqube-summary.json
