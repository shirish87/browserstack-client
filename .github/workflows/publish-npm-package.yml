name: Publish npm package
# Disabled — npm publishing is not active. Re-enable by restoring the trigger below.
on:
  push:
    branches:
      - '__disabled__'

concurrency:
  group: publish-npm-package
  cancel-in-progress: false

env:
  VITE_BROWSERSTACK_USERNAME: "${{ secrets.VITE_BROWSERSTACK_USERNAME }}"
  VITE_BROWSERSTACK_KEY: "${{ secrets.VITE_BROWSERSTACK_KEY }}"

jobs:
  publish-node-lts:
    name: "node.js lts"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'publish' }}
    environment: BrowserStackEnv
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build and test
        run: pnpm build:types && pnpm build && pnpm test

      - name: npm publish @next
        run: pnpm publish --tag next --filter "./packages/*" --no-git-checks
        if: ${{ github.event.release.prerelease }}
        env:
          NODE_AUTH_TOKEN: "${{ secrets.NPM_PUBLISH_TOKEN }}"

      - name: npm publish
        run: pnpm publish --filter "./packages/*" --no-git-checks
        if: ${{ !github.event.release.prerelease }}
        env:
          NODE_AUTH_TOKEN: "${{ secrets.NPM_PUBLISH_TOKEN }}"
