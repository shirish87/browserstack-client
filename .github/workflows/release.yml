name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v6.0.1)'
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Go CLI: native binaries for all platforms ────────────────────────────────
  build-go:
    name: Build Go CLI (native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: packages/cli/golang/go.mod
          cache-dependency-path: packages/cli/golang/go.mod

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate types (codegen)
        run: pnpm build:types

      - name: Cross-compile for all platforms
        working-directory: packages/cli/golang
        run: make build-all-platforms

      - name: Upload Go binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: go-binaries
          path: packages/cli/golang/dist/browserstack-client-*
          if-no-files-found: error
          retention-days: 1

  # ── TypeScript CLI: Node.js-bundled binaries ─────────────────────────────────
  build-ts:
    name: Build TypeScript CLI (Node.js bundled)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate types (codegen)
        run: pnpm build:types

      - name: Build TypeScript CLI binary
        run: pnpm build:cli:ts

      - name: Upload TypeScript binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ts-binaries
          path: |
            packages/cli/typescript/dist-binary/browserstack-client-ts-linux-amd64
            packages/cli/typescript/dist-binary/browserstack-client-ts-linux-arm64
            packages/cli/typescript/dist-binary/browserstack-client-ts-darwin-amd64
            packages/cli/typescript/dist-binary/browserstack-client-ts-darwin-arm64
            packages/cli/typescript/dist-binary/browserstack-client-ts-windows-amd64.exe
          if-no-files-found: error
          retention-days: 1

  # ── SDK packages: npm tarballs ───────────────────────────────────────────────
  build-sdk:
    name: Pack SDK tarballs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate types (codegen)
        run: pnpm build:types

      - name: Build all SDK packages
        run: pnpm build

      - name: Pack tarballs
        run: |
          mkdir -p release-tarballs
          for pkg in automate app-automate screenshots local-testing local-testing-binary accessibility test-management test-reporting; do
            pnpm --filter "@dot-slash/browserstack-$pkg" pack --pack-destination release-tarballs
          done

      - name: Upload SDK tarballs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sdk-tarballs
          path: release-tarballs/*.tgz
          if-no-files-found: error
          retention-days: 1

  # ── Create GitHub Release ────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-go, build-ts, build-sdk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve tag name
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Go binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: go-binaries
          path: release-assets/go

      - name: Download TypeScript binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ts-binaries
          path: release-assets/ts

      - name: Download SDK tarballs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sdk-tarballs
          path: release-assets/sdk

      - name: Make binaries executable
        run: |
          chmod +x release-assets/go/browserstack-client-linux-amd64
          chmod +x release-assets/go/browserstack-client-linux-arm64
          chmod +x release-assets/go/browserstack-client-darwin-amd64
          chmod +x release-assets/go/browserstack-client-darwin-arm64
          chmod +x release-assets/ts/browserstack-client-ts-linux-amd64
          chmod +x release-assets/ts/browserstack-client-ts-linux-arm64
          chmod +x release-assets/ts/browserstack-client-ts-darwin-amd64
          chmod +x release-assets/ts/browserstack-client-ts-darwin-arm64

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" "${PREV_TAG}..${TAG}" -- . ':!.github')
          else
            CHANGELOG=$(git log --pretty=format:"- %s" "${TAG}" -- . ':!.github')
          fi
          PKG_VERSION=$(node -e "process.stdout.write(require('./packages/cli/typescript/package.json').version)")
          {
            DELIMITER="RELEASE_NOTES_$(openssl rand -hex 8)"
            echo "notes<<${DELIMITER}"
            echo "## Go CLI — native binaries (no Node.js required)"
            echo ""
            echo "| Platform | Architecture | File |"
            echo "|----------|-------------|------|"
            echo "| Linux | x64 | \`browserstack-client-linux-amd64\` |"
            echo "| Linux | arm64 | \`browserstack-client-linux-arm64\` |"
            echo "| macOS | x64 | \`browserstack-client-darwin-amd64\` |"
            echo "| macOS | arm64 (M1/M2) | \`browserstack-client-darwin-arm64\` |"
            echo "| Windows | x64 | \`browserstack-client-windows-amd64.exe\` |"
            echo ""
            echo "## TypeScript CLI — Node.js bundled"
            echo ""
            echo "| Platform | Architecture | File |"
            echo "|----------|-------------|------|"
            echo "| Linux | x64 | \`browserstack-client-ts-linux-amd64\` |"
            echo "| Linux | arm64 | \`browserstack-client-ts-linux-arm64\` |"
            echo "| macOS | x64 | \`browserstack-client-ts-darwin-amd64\` |"
            echo "| macOS | arm64 (M1/M2) | \`browserstack-client-ts-darwin-arm64\` |"
            echo "| Windows | x64 | \`browserstack-client-ts-windows-amd64.exe\` |"
            echo ""
            echo "## SDK Packages"
            echo ""
            echo "Install directly from this release (no npm registry required):"
            echo "\`\`\`sh"
            echo "# Example: install the Automate SDK"
            echo "npm install https://github.com/shirish87/browserstack-client/releases/download/${TAG}/browserstack-client-automate-\${PKG_VERSION}.tgz"
            echo "\`\`\`"
            echo ""
            echo "Available packages: \`automate\`, \`app-automate\`, \`screenshots\`, \`local-testing\`, \`local-testing-binary\`, \`accessibility\`, \`test-management\`, \`test-reporting\`"
            echo ""
            echo "## Changes"
            echo ""
            echo "${CHANGELOG}"
            echo "${DELIMITER}"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ steps.notes.outputs.notes }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          IS_PRE=$(echo "$TAG" | grep -qE '\-(alpha|beta|rc)([.\d]|$)' && echo "true" || echo "false")
          
          # Check if release exists
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists, updating notes and assets..."
            gh release edit "$TAG" --notes "$RELEASE_NOTES" $( [ "$IS_PRE" = "true" ] && echo "--prerelease" )
            gh release upload "$TAG" \
              --clobber \
              release-assets/go/browserstack-client-linux-amd64 \
              release-assets/go/browserstack-client-linux-arm64 \
              release-assets/go/browserstack-client-darwin-amd64 \
              release-assets/go/browserstack-client-darwin-arm64 \
              "release-assets/go/browserstack-client-windows-amd64.exe" \
              release-assets/ts/browserstack-client-ts-linux-amd64 \
              release-assets/ts/browserstack-client-ts-linux-arm64 \
              release-assets/ts/browserstack-client-ts-darwin-amd64 \
              release-assets/ts/browserstack-client-ts-darwin-arm64 \
              "release-assets/ts/browserstack-client-ts-windows-amd64.exe" \
              release-assets/sdk/*.tgz
          else
            echo "Creating new release $TAG..."
            gh release create "$TAG" \
              --title "Release $TAG" \
              --notes "$RELEASE_NOTES" \
              $( [ "$IS_PRE" = "true" ] && echo "--prerelease" ) \
              release-assets/go/browserstack-client-linux-amd64 \
              release-assets/go/browserstack-client-linux-arm64 \
              release-assets/go/browserstack-client-darwin-amd64 \
              release-assets/go/browserstack-client-darwin-arm64 \
              "release-assets/go/browserstack-client-windows-amd64.exe" \
              release-assets/ts/browserstack-client-ts-linux-amd64 \
              release-assets/ts/browserstack-client-ts-linux-arm64 \
              release-assets/ts/browserstack-client-ts-darwin-amd64 \
              release-assets/ts/browserstack-client-ts-darwin-arm64 \
              "release-assets/ts/browserstack-client-ts-windows-amd64.exe" \
              release-assets/sdk/*.tgz
          fi
