# packages/openapi/field-overrides.yaml
# Per-field camelCase name overrides for API inconsistencies.
# Format:
#   overrides:
#     <operationId>:
#       request:
#         <snake_case_wire_name>: <camelCase_public_name>
#       response:
#         <snake_case_wire_name>: <camelCase_public_name>
#
# Only add entries here when the blanket snake_case→camelCase transform
# produces a wrong or confusing name. Most fields don't need overrides.
overrides:
  uploadTestReportingReport:
    # The upload-automation API expects camelCase form field names on the wire,
    # unlike all other BrowserStack APIs that use snake_case.
    # Map snake_wire → camelPublic so that toSnakeCase leaves them untouched.
    request:
      data: file
      projectName: projectName
      buildName: buildName
      buildIdentifier: buildIdentifier
      frameworkVersion: frameworkVersion
      versionControl: versionControl
