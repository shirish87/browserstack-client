servers:
  - url: "{scheme}://{host}"
    variables:
      scheme:
        default: https
      host:
        default: test-management.browserstack.com

openapi: 3.0.2
info:
  title: BrowserStack Test Management
  version: 2.0.0
  description: BrowserStack Test Management API
  license:
    name: MIT License
    url: https://opensource.org/license/mit/

externalDocs:
  description: Find out more about BrowserStack Test Management
  url: https://www.browserstack.com/docs/test-management/api-reference/introduction

security:
  - basicAuth: []

paths:

  # ── Projects ────────────────────────────────────────────────────────────────

  /api/v2/projects:
    get:
      tags: [Projects]
      summary: Get list of projects
      operationId: getTestManagementProjects
      x-cli-section: "Projects"
      x-response-transform:
        codec: json-unwrap
        config:
          path: "$.projects"
      parameters:
        - name: p
          in: query
          schema: { type: integer }
        - name: page_size
          in: query
          schema: { type: integer, enum: [30, 300] }
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  projects:
                    type: array
                    items: { $ref: '#/components/schemas/ProjectSummary' }
                  info: { $ref: '#/components/schemas/PaginationInfo' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Projects]
      summary: Create a project
      operationId: createTestManagementProject
      x-cli-section: "Projects"
      x-response-transform:
        codec: json-unwrap
        config:
          path: "$.project"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: CreateTestManagementProjectRequest
              type: object
              properties:
                project:
                  title: CreateProjectInput
                  type: object
                  required: [name]
                  properties:
                    name: { type: string }
                    description: { type: string }
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  project: { $ref: '#/components/schemas/Project' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v2/projects/{projectId}:
    get:
      tags: [Projects]
      summary: Get project details
      operationId: getTestManagementProject
      x-cli-section: "Projects"
      x-response-transform:
        codec: json-unwrap
        config:
          path: "$.project"
      parameters:
        - { $ref: '#/components/parameters/ProjectId' }
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  project: { $ref: '#/components/schemas/Project' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Projects]
      summary: Update a project
      operationId: updateTestManagementProject
      x-cli-section: "Projects"
      x-response-transform:
        codec: json-unwrap
        config:
          path: "$.project"
      parameters:
        - { $ref: '#/components/parameters/ProjectId' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: UpdateTestManagementProjectRequest
              type: object
              properties:
                project:
                  title: UpdateProjectInput
                  type: object
                  properties:
                    name: { type: string }
                    description: { type: string }
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  project: { $ref: '#/components/schemas/Project' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Projects]
      summary: Delete a project
      operationId: deleteTestManagementProject
      x-cli-section: "Projects"
      parameters:
        - { $ref: '#/components/parameters/ProjectId' }
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ── Folders ─────────────────────────────────────────────────────────────────

  /api/v2/projects/{projectId}/folders:
    get:
      tags: [Folders]
      summary: Get list of folders in a project
      operationId: getTestManagementFolders
      x-cli-section: "Folders"
      x-response-transform:
        codec: json-unwrap
        config:
          path: "$.folders"
      parameters:
        - { $ref: '#/components/parameters/ProjectId' }
        - name: p
          in: query
          schema: { type: integer }
        - name: page_size
          in: query
          schema: { type: integer, enum: [30, 300] }
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  folders:
                    type: array
                    items: { $ref: '#/components/schemas/FolderSummary' }
                  info: { $ref: '#/components/schemas/PaginationInfo' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Folders]
      summary: Create a folder
      operationId: createTestManagementFolder
      x-cli-section: "Folders"
      x-response-transform:
        codec: json-unwrap
        config:
          path: "$.folder"
      parameters:
        - { $ref: '#/components/parameters/ProjectId' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: CreateTestManagementFolderRequest
              type: object
              properties:
                folder:
                  title: CreateFolderData
                  type: object
                  required: [name, description]
                  properties:
                    name: { type: string }
                    description: { type: string }
                    parent_id: { type: integer, nullable: true }
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  folder: { $ref: '#/components/schemas/Folder' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v2/projects/{projectId}/folders/{folderId}:
    get:
      tags: [Folders]
      summary: Get folder details
      operationId: getTestManagementFolder
      x-cli-section: "Folders"
      x-response-transform:
        codec: json-unwrap
        config:
          path: "$.folder"
      parameters:
        - { $ref: '#/components/parameters/ProjectId' }
        - { $ref: '#/components/parameters/FolderId' }
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  folder: { $ref: '#/components/schemas/Folder' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Folders]
      summary: Update a folder
      operationId: updateTestManagementFolder
      x-cli-section: "Folders"
      x-response-transform:
        codec: json-unwrap
        config:
          path: "$.folder"
      parameters:
        - { $ref: '#/components/parameters/ProjectId' }
        - { $ref: '#/components/parameters/FolderId' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: UpdateTestManagementFolderRequest
              type: object
              properties:
                folder:
                  title: UpdateFolderData
                  type: object
                  properties:
                    name: { type: string }
                    description: { type: string }
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  folder: { $ref: '#/components/schemas/Folder' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Folders]
      summary: Delete a folder
      operationId: deleteTestManagementFolder
      x-cli-section: "Folders"
      parameters:
        - { $ref: '#/components/parameters/ProjectId' }
        - { $ref: '#/components/parameters/FolderId' }
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v2/projects/{projectId}/folders/{folderId}/move:
    post:
      tags: [Folders]
      summary: Move a folder
      operationId: moveTestManagementFolder
      x-cli-section: "Folders"
      x-response-transform:
        codec: json-unwrap
        config:
          path: "$.folder"
      parameters:
        - { $ref: '#/components/parameters/ProjectId' }
        - { $ref: '#/components/parameters/FolderId' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                parent_id: { type: integer, nullable: true }
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  folder: { $ref: '#/components/schemas/Folder' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ── Test Cases ──────────────────────────────────────────────────────────────

  /api/v2/projects/{projectId}/test-cases:
    get:
      tags: [TestCases]
      summary: Get list of test cases
      operationId: getTestManagementTestCases
      x-cli-section: "Test Cases"
      x-response-transform:
        codec: json-unwrap
        config:
          path: "$.test_cases"
      parameters:
        - { $ref: '#/components/parameters/ProjectId' }
        - { name: p, in: query, schema: { type: integer } }
        - { name: page_size, in: query, schema: { type: integer, enum: [30, 300] } }
        - { name: updated_after, in: query, schema: { type: string } }
        - { name: updated_before, in: query, schema: { type: string } }
        - { name: archived, in: query, schema: { type: boolean } }
        - { name: minify, in: query, schema: { type: boolean } }
        - { name: id, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
        - { name: priority, in: query, schema: { type: string } }
        - { name: owner, in: query, schema: { type: string } }
        - { name: case_type, in: query, schema: { type: string } }
        - name: folder_id
          in: query
          schema: { type: integer }
          x-cli-picker:
            source: test-management.list-folders
            valueField: id
            labelFields: [id, name]
            filterBy: [projectId]
        - { name: tags, in: query, schema: { type: string } }
        - { name: issue_ids, in: query, schema: { type: string } }
        - { name: issue_type, in: query, schema: { type: string } }
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  test_cases:
                    type: array
                    items: { $ref: '#/components/schemas/TestCase' }
                  info: { $ref: '#/components/schemas/PaginationInfo' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    patch:
      tags: [TestCases]
      summary: Bulk edit test cases
      operationId: bulkEditTestManagementTestCases
      x-cli-section: "Test Cases (Bulk)"
      parameters:
        - { $ref: '#/components/parameters/ProjectId' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: BulkEditTestManagementTestCasesRequest
              type: object
              required: [ids, test_case]
              properties:
                ids:
                  type: array
                  items: { type: string }
                test_case:
                  title: BulkEditTestCaseData
                  type: object
                  properties:
                    preconditions: { type: string }
                    owner: { type: string }
                    tags: { type: array, items: { type: string } }
                    custom_fields: { type: object, additionalProperties: true }
                    automation_status: { type: string }
                    case_type: { type: string }
                    priority: { type: string }
                    status: { type: string }
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
        '401': { $ref: '#/components/responses/Unauthorized' }
    delete:
      tags: [TestCases]
      summary: Bulk delete test cases
      operationId: bulkDeleteTestManagementTestCases
      x-cli-section: "Test Cases (Bulk)"
      parameters:
        - { $ref: '#/components/parameters/ProjectId' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v2/projects/{projectId}/test-cases/archive:
    post:
      tags: [TestCases]
      summary: Bulk archive test cases
      operationId: bulkArchiveTestManagementTestCases
      x-cli-section: "Test Cases (Bulk)"
      parameters:
        - { $ref: '#/components/parameters/ProjectId' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items: { type: string }
                  maxItems: 1000
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v2/projects/{projectId}/test-cases/unarchive:
    post:
      tags: [TestCases]
      summary: Bulk unarchive test cases
      operationId: bulkUnarchiveTestManagementTestCases
      x-cli-section: "Test Cases (Bulk)"
      parameters:
        - { $ref: '#/components/parameters/ProjectId' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items: { type: string }
                  maxItems: 1000
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v2/projects/{projectId}/test-cases/with-operations:
    patch:
      tags: [TestCases]
      summary: Bulk edit test cases with operations
      operationId: bulkEditTestManagementTestCasesWithOperations
      x-cli-section: "Test Cases (Bulk)"
      parameters:
        - { $ref: '#/components/parameters/ProjectId' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: BulkEditTestManagementTestCasesWithOperationsRequest
              type: object
              required: [ids, test_case]
              properties:
                ids:
                  type: array
                  items: { type: string }
                test_case:
                  title: BulkEditTestCaseData
                  type: object
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v2/projects/{projectId}/folders/{folderId}/test-cases:
    post:
      tags: [TestCases]
      summary: Create a test case
      operationId: createTestManagementTestCase
      x-cli-section: "Test Cases"
      x-response-transform:
        codec: json-unwrap
        config:
          path: "$.data.test_case"
      parameters:
        - { $ref: '#/components/parameters/ProjectId' }
        - { $ref: '#/components/parameters/FolderId' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: CreateTestManagementTestCaseRequest
              type: object
              properties:
                test_case:
                  title: CreateTestCaseData
                  type: object
                  properties:
                    name: { type: string }
                    template: { type: string }
                    description: { type: string }
                    owner: { type: string }
                    preconditions: { type: string }
                    test_case_steps:
                      type: array
                      items:
                        type: object
                        properties:
                          description: { type: string }
                          result: { type: string }
                    issues:
                      type: array
                      items: { type: string }
                    issue_tracker:
                      $ref: '#/components/schemas/IssueTracker'
                    tags:
                      type: array
                      items: { type: string }
                    case_type: { type: string }
                    priority: { type: string }
                    custom_fields: { type: object, additionalProperties: true }
                    feature: { type: string }
                    scenario: { type: string }
                    background: { type: string }
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: CreateTestManagementTestCaseResponse
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    title: CreateTestCaseResponseData
                    type: object
                    properties:
                      test_case: { $ref: '#/components/schemas/TestCase' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v2/projects/{projectId}/test-cases/{testCaseId}:
    patch:
      tags: [TestCases]
      summary: Update a test case
      operationId: updateTestManagementTestCase
      x-cli-section: "Test Cases"
      x-response-transform:
        codec: json-unwrap
        config:
          path: "$.data.test_case"
      parameters:
        - { $ref: '#/components/parameters/ProjectId' }
        - { $ref: '#/components/parameters/TestCaseId' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: UpdateTestManagementTestCaseRequest
              type: object
              properties:
                test_case:
                  title: UpdateTestCaseData
                  type: object
                  properties:
                    name: { type: string }
                    case_type: { type: string }
                    priority: { type: string }
                    status: { type: string }
                    description: { type: string }
                    owner: { type: string }
                    preconditions: { type: string }
                    test_case_steps:
                      type: array
                      items:
                        type: object
                        properties:
                          description: { type: string }
                          result: { type: string }
                    issues:
                      type: array
                      items: { type: string }
                    issue_tracker:
                      $ref: '#/components/schemas/IssueTracker'
                    tags:
                      type: array
                      items: { type: string }
                    custom_fields: { type: object, additionalProperties: true }
                    automation_status: { type: string }
                    feature: { type: string }
                    scenario: { type: string }
                    background: { type: string }
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: UpdateTestManagementTestCaseResponse
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    title: UpdateTestCaseResponseData
                    type: object
                    properties:
                      test_case: { $ref: '#/components/schemas/TestCase' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [TestCases]
      summary: Delete a test case
      operationId: deleteTestManagementTestCase
      x-cli-section: "Test Cases"
      parameters:
        - { $ref: '#/components/parameters/ProjectId' }
        - { $ref: '#/components/parameters/TestCaseId' }
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v2/projects/{projectId}/test-cases/{testCaseId}/archive:
    post:
      tags: [TestCases]
      summary: Archive a test case
      operationId: archiveTestManagementTestCase
      x-cli-section: "Test Cases"
      x-response-transform:
        codec: json-unwrap
        config:
          path: "$.data.test_case"
      parameters:
        - { $ref: '#/components/parameters/ProjectId' }
        - { $ref: '#/components/parameters/TestCaseId' }
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    $ref: '#/components/schemas/TestCaseResponseData'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v2/projects/{projectId}/test-cases/{testCaseId}/unarchive:
    post:
      tags: [TestCases]
      summary: Unarchive a test case
      operationId: unarchiveTestManagementTestCase
      x-cli-section: "Test Cases"
      x-response-transform:
        codec: json-unwrap
        config:
          path: "$.data.test_case"
      parameters:
        - { $ref: '#/components/parameters/ProjectId' }
        - { $ref: '#/components/parameters/TestCaseId' }
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    $ref: '#/components/schemas/TestCaseResponseData'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v2/projects/{projectId}/test-cases/{testCaseId}/move:
    post:
      tags: [TestCases]
      summary: Move a test case to a different folder
      operationId: moveTestManagementTestCase
      x-cli-section: "Test Cases"
      x-response-transform:
        codec: json-unwrap
        config:
          path: "$.data.test_case"
      parameters:
        - { $ref: '#/components/parameters/ProjectId' }
        - { $ref: '#/components/parameters/TestCaseId' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [destination_folder_id]
              properties:
                destination_folder_id: { type: integer }
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    $ref: '#/components/schemas/TestCaseResponseData'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v2/projects/{projectId}/test-cases/{testCaseId}/attachments:
    get:
      tags: [Attachments]
      summary: Get attachments for a test case
      operationId: getTestManagementTestCaseAttachments
      x-cli-section: "Test Case Attachments"
      x-response-transform:
        codec: json-unwrap
        config:
          path: "$.attachments"
      parameters:
        - { $ref: '#/components/parameters/ProjectId' }
        - { $ref: '#/components/parameters/TestCaseId' }
        - { name: p, in: query, schema: { type: integer } }
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  attachments:
                    type: array
                    items: { $ref: '#/components/schemas/Attachment' }
                  info: { $ref: '#/components/schemas/PaginationInfo' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Attachments]
      summary: Add attachment to a test case
      operationId: addTestManagementTestCaseAttachment
      x-cli-section: "Test Case Attachments"
      x-request-transform:
        codec: multipart
        config:
          fileField: file
          filenameFrom: "$.file_name"
      x-response-transform:
        codec: json-unwrap
        config:
          path: "$.attachment"
      parameters:
        - { $ref: '#/components/parameters/ProjectId' }
        - { $ref: '#/components/parameters/TestCaseId' }
        - { name: inline, in: query, schema: { type: boolean } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                file_name:
                  type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
