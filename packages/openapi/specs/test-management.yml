              type: object
              required: [field_name, field_type, field_entity_type]
              properties:
                field_name: { type: string, maxLength: 32 }
                place_holder_text: { type: string, maxLength: 150 }
                field_type: { type: string, enum: [string, dropdown, text, user, boolean, url, date, int] }
                is_required: { type: boolean }
                options:
                  type: array
                  items:
                    type: object
                    properties:
                      option_value: { type: string }
                      is_default: { type: boolean }
                applies_to_all_projects: { type: boolean }
                field_entity_type: { type: string, enum: [test_case, test_result] }
                link_to_future_projects: { type: boolean }
                assigned_projects:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  custom_field: { $ref: '#/components/schemas/CustomField' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v2/custom-fields/{customFieldId}:
    patch:
      tags: [CustomFields]
      summary: Update a custom field
      operationId: updateTestManagementCustomField
      x-cli-section: "Custom Fields"
      x-response-transform:
        codec: json-unwrap
        config:
          path: "$.data.custom_field"
      parameters:
        - { $ref: '#/components/parameters/CustomFieldId' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                field_name: { type: string }
                place_holder_text: { type: string }
                field_type: { type: string }
                is_required: { type: boolean }
                options: { type: array, items: { type: object } }
                applies_to_all_projects: { type: boolean }
                field_entity_type: { type: string }
                link_to_future_projects: { type: boolean }
                assigned_projects: { type: array, items: { type: string } }
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CustomFieldResponseData'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [CustomFields]
      summary: Delete a custom field
      operationId: deleteTestManagementCustomField
      x-cli-section: "Custom Fields"
      parameters:
        - { $ref: '#/components/parameters/CustomFieldId' }
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic

  parameters:
    ProjectId:
      name: projectId
      x-cli-picker:
        source: test-management.list-projects
        valueField: id
        labelFields: [id, name]
      in: path
      required: true
      schema: { type: string }
    FolderId:
      name: folderId
      x-cli-picker:
        source: test-management.list-folders
        valueField: id
        labelFields: [id, name]
        filterBy: [projectId]
      in: path
      required: true
      schema: { type: integer }
    TestCaseId:
      name: testCaseId
      x-cli-picker:
        source: test-management.list-test-cases
        valueField: id
        labelFields: [id, name]
        filterBy: [projectId]
      in: path
      required: true
      schema: { type: string }
    TestRunId:
      name: testRunId
      x-cli-picker:
        source: test-management.list-test-runs
        valueField: id
        labelFields: [id, name]
        filterBy: [projectId]
      in: path
      required: true
      schema: { type: string }
    TestPlanId:
      name: testPlanId
      x-cli-picker:
        source: test-management.list-test-plans
        valueField: id
        labelFields: [id, name]
        filterBy: [projectId]
      in: path
      required: true
      schema: { type: string }
    TestResultId:
      name: testResultId
      x-cli-picker:
        source: test-management.list-test-run-results
        valueField: id
        labelFields: [id]
        filterBy: [projectId, testRunId]
      in: path
      required: true
      schema: { type: integer }
    AttachmentId:
      name: attachmentId
      x-cli-picker:
        source: test-management.list-test-case-attachments
        valueField: id
        labelFields: [id, name]
        filterBy: [projectId, testCaseId]
      in: path
      required: true
      schema: { type: integer }
    ConfigurationId:
      name: configurationId
      x-cli-picker:
        source: test-management.list-configurations
        valueField: id
        labelFields: [id, name]
        filterBy: [projectId]
      in: path
      required: true
      schema: { type: string }
    CustomFieldId:
      name: customFieldId
      x-cli-picker:
        source: test-management.list-custom-fields
        valueField: id
        labelFields: [id, name]
        filterBy: [projectId]
      in: path
      required: true
      schema: { type: string }

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            type: object
            properties:
              message: { type: string }
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            type: object
            properties:
              message: { type: string }

  schemas:
    PaginationInfo:
      type: object
      properties:
        page: { type: integer }
        page_size: { type: integer }
        count: { type: integer }
        prev: { type: integer, nullable: true }
        next: { type: integer, nullable: true }

    ProjectSummary:
      type: object
      properties:
        name: { type: string }
        identifier: { type: string }

    Project:
      type: object
      properties:
        name: { type: string }
        identifier: { type: string }
        description: { type: string }
        created_at: { type: string }
        created_by: { type: string }
        team_id:
          type: array
          items: { type: integer }

    CustomFieldResponseData:
      type: object
      properties:
        custom_field: { $ref: '#/components/schemas/CustomField' }
    TestCaseResponseData:
      type: object
      properties:
        test_case: { $ref: '#/components/schemas/TestCase' }
    TestRunCount:
      type: object
      properties:
        active: { type: integer }
        closed: { type: integer }
    TestCaseFilter:
      type: object
      properties:
        status: { type: array, items: { type: string } }
        priority: { type: array, items: { type: string } }
        case_type: { type: array, items: { type: string } }
        owner: { type: array, items: { type: string } }
        tags: { type: array, items: { type: string } }
        custom_fields: { type: object, additionalProperties: true }
    IssueTracker:
      type: object
      properties:
        name: { type: string }
        host: { type: string }
    TestRunPlanSummary:
      type: object
      nullable: true
      properties:
        identifier: { type: string }
        name: { type: string }
    TestRunLinks:
      type: object
      additionalProperties: true
    TestRunProgress:
      type: object
      additionalProperties: true
    CreateTestRunInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        plan_status: { type: string }
        description: { type: string }
        start_date: { type: string }
        end_date: { type: string, nullable: true }
    FolderLinks:
      type: object
      properties:
        sub_folders: { type: string }
    FolderSummary:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        parent_id: { type: integer, nullable: true }
        sub_folders_count: { type: integer }
        links:
          $ref: '#/components/schemas/FolderLinks'

    Folder:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string }
        parent_id: { type: integer, nullable: true }
        cases_count: { type: integer }
        sub_folders_count: { type: integer }
        links:
          $ref: '#/components/schemas/FolderLinks'

    TestCaseStep:
      type: object
      properties:
        id: { type: integer }
        order: { type: integer }
        description: { type: string }
        result: { type: string }

    TestCase:
      type: object
      properties:
        identifier: { type: string }
        name: { type: string }
        description: { type: string }
        owner: { type: string }
        preconditions: { type: string }
        case_type: { type: string }
        priority: { type: string }
        status: { type: string }
        automation_status: { type: string }
        archived: { type: string }
        folder_id: { type: integer }
        template: { type: string }
        tags:
          type: array
          items: { type: string }
        test_case_steps:
          type: array
          items: { $ref: '#/components/schemas/TestCaseStep' }
        issues:
          type: array
          items: { type: string }
        custom_fields: { type: object, additionalProperties: true }
        created_at: { type: string }
        updated_at: { type: string }
        feature: { type: string }
        scenario: { type: string }
        background: { type: string }

    TestRunSummary:
      type: object
      properties:
        identifier: { type: string }
        name: { type: string }
        active_state: { type: string }
        run_state: { type: string }
        assignee: { type: string }
        created_at: { type: string }
        project_id: { type: string }
        test_cases_count: { type: integer }
        configurations:
          type: array
          items: { type: integer }

    TestRun:
      type: object
      properties:
        identifier: { type: string }
        name: { type: string }
        description: { type: string }
        active_state: { type: string }
        run_state: { type: string }
        assignee: { type: string }
        created_at: { type: string }
        updated_at: { type: string }
        project_id: { type: string }
        test_cases_count: { type: integer }
        tags:
          type: array
          items: { type: string }
        issues:
          type: array
          items: { type: string }
        test_plan:
          $ref: '#/components/schemas/TestRunPlanSummary'

    TestRunDetail:
      allOf:
        - $ref: '#/components/schemas/TestRun'
        - type: object
          properties:
            configurations:
              type: array
              items: { type: integer }
            test_cases:
              type: array
              items: { $ref: '#/components/schemas/TestRunTestCase' }
            links:
              $ref: '#/components/schemas/TestRunLinks'
            passed_count: { type: integer }
            failed_count: { type: integer }
            overall_progress:
              $ref: '#/components/schemas/TestRunProgress'

    TestRunTestCase:
      type: object
      properties:
        identifier: { type: string }
        name: { type: string }
        description: { type: string }
        case_type: { type: string }
        priority: { type: string }
        status: { type: string }
        assignee: { type: string }
        latest_status: { type: string }
        latest_result_id: { type: integer }
        configuration_id: { type: integer }
        folder_path:
          type: array
          items: { type: integer }
        steps:
          type: array
          items: { $ref: '#/components/schemas/TestCaseStep' }
        dataset:
          type: array
          items:
            type: object
            properties:
              variable: { type: string }
              row: { type: string }
        created_at: { type: string }
        last_updated_at: { type: string }
        created_by: { type: string }
        last_updated_by: { type: string }

    TestRunInput:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        run_state: { type: string }
        assignee: { type: string }
        test_case_assignee: { type: string }
        tags:
          type: array
          items: { type: string }
        issues:
          type: array
          items: { type: string }
        issue_tracker:
          $ref: '#/components/schemas/IssueTracker'
        test_plan_id: { type: string }
        configurations:
          type: array
          items: { type: integer }
        configuration_map:
          type: array
          items:
            type: object
            properties:
              test_case_id:
                oneOf:
                  - type: string
                  - type: array
                    items: { type: string }
              configuration_ids:
                type: array
                items: { type: integer }
        test_cases:
          type: array
          items: { type: string }
        folder_ids:
          type: array
          items: { type: integer }
        include_all: { type: boolean }
        filter_test_cases:
          $ref: '#/components/schemas/TestCaseFilter'

    TestRunPatchInput:
      type: object
      properties:
        name: { type: string }
        run_state: { type: string }
        tags:
          type: array
          items: { type: string }
        configurations:
          type: array
          items: { type: integer }
        configuration_map:
          type: array
          items:
            type: object
            properties:
              test_case_id:
                oneOf:
                  - type: string
                  - type: array
                    items: { type: string }
              configuration_ids:
                type: array
                items: { type: integer }
        filter_test_cases:
          $ref: '#/components/schemas/TestCaseFilter'

    TestPlan:
      type: object
      properties:
        identifier: { type: string }
        name: { type: string }
        description: { type: string }
        active_state: { type: string }
        plan_status: { type: string }
        project_id: { type: string }
        start_date: { type: string }
        end_date: { type: string, nullable: true }
        created_at: { type: string }
        test_runs_count:
          $ref: '#/components/schemas/TestRunCount'

    TestPlanDetail:
      allOf:
        - $ref: '#/components/schemas/TestPlan'
        - type: object
          properties:
            test_runs:
              type: array
              items: { $ref: '#/components/schemas/TestRunSummary' }

    TestResult:
      type: object
      properties:
        id: { type: integer }
        test_run_id: { type: string }
        test_case_id: { type: string }
        configuration_id: { type: integer }
        status: { type: string }
        comment: { type: string }
        duration: { type: integer }
        created_at: { type: string }
        created_by: { type: string }
        attachments:
          type: array
          items: { $ref: '#/components/schemas/Attachment' }
        issues:
          type: array
          items: { type: string }
        custom_fields: { type: object, additionalProperties: true }

    TestResultInput:
      type: object
      required: [status]
      properties:
        status: { type: string }
        comment: { type: string }
        duration: { type: integer }
        issues:
          type: array
          items: { type: string }
        issue_tracker:
          $ref: '#/components/schemas/IssueTracker'
        custom_fields: { type: object, additionalProperties: true }

    Attachment:
      type: object
      properties:
        id: { type: integer }
        filename: { type: string }
        file_size: { type: integer }
        created_at: { type: string }
        created_by: { type: string }
        url: { type: string }
        inline: { type: boolean }

    Configuration:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        created_at: { type: string }

    CustomField:
      type: object
      properties:
        id: { type: string }
        field_name: { type: string }
        place_holder_text: { type: string }
        field_type: { type: string }
        is_required: { type: boolean }
        options:
          type: array
          items:
            type: object
            properties:
              option_value: { type: string }
              is_default: { type: boolean }
        applies_to_all_projects: { type: boolean }
        field_entity_type: { type: string }
        link_to_future_projects: { type: boolean }
        assigned_projects:
          type: array
          items: { type: string }
        created_at: { type: string }
