servers:
  - url: "{scheme}://{host}{basePath}"
    variables:
      scheme:
        default: https
      host:
        default: api.browserstack.com
      basePath:
        default: "/5"
  - url: "{scheme}://{host}"
    variables:
      scheme:
        default: https
      host:
        default: api-cloud.browserstack.com

openapi: 3.0.2
info:
  title: BrowserStack Js Testing
  version: 5.0.0
  description: BrowserStack Js Testing API
  license:
    name: MIT License
    url: https://opensource.org/license/mit/

externalDocs:
  description: Find out more about BrowserStack
  url: https://www.browserstack.com/docs/


security:
  - basicAuth: []

paths:
  /status:
    get:
      tags:
      - JSTesting
      summary: Fetches status.
      description: Fetches status.
      operationId: getStatus
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /worker/{workerId}/screenshot.{format}:
    get:
      tags:
      - JSTesting
      summary: Fetch a screenshot of the specified worker.
      description: Fetch a screenshot of the current state of the worker.
      operationId: getWorkerScreenshot
      parameters:
      - name: workerId
        in: path
        required: true
        description: ID of the worker
        schema:
          type: number
          example: 122326697
      - name: format
        in: path
        required: true
        description: Format of the screenshot
        schema:
          type: string
          enum:
          - png
          - json
          - xml
          example: png
      responses:
        '200':
          description: Successful operation
          content:
            image/png:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: object
                required:
                - url
                properties:
                  url:
                    type: string
                    description: Link to the captured screenshot
                    example: https://s3.amazonaws.com/testautomation/efe4b6a63529d2b8ff64909db1a60fa473f1d8bf/js-screenshot-1708342782.png
            application/xml:
              schema:
                type: string
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '403':
          $ref: '#/components/schemas/403.Forbidden'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /worker/{workerId}/url.json:
    put:
      tags:
      - JSTesting
      summary: Set a new URL for a worker-browser instance to navigate to
      description: Set a new URL for a worker-browser instance to navigate to
      operationId: updateWorkerURL
      parameters:
      - name: workerId
        in: path
        required: true
        description: ID of the worker
        schema:
          type: number
          example: 122326697
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: UpdateWorkerURLRequest
              type: object
              required:
              - url
              properties:
                url:
                  type: string
                  description: New URL for the worker
                  example: https://www.google.com/ncr
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: UpdateWorkerURLResponse
                type: object
                required:
                - message
                properties:
                  message:
                    type: string
                    description: Status of the update URL operation
                    example: Browser updated with new url
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '403':
          $ref: '#/components/schemas/403.Forbidden'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /browsers:
    get:
      tags:
      - JSTesting
      parameters:
      - name: flat
        in: query
        description: If true, returns a flat list of all available browsers. If false,
          returns a nested list of browsers grouped by OS and OS version.
        required: false
        schema:
          type: boolean
          default: true
      summary: Fetches all available browsers.
      description: Fetches all available browsers.
      operationId: getBrowsers
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: GetBrowsersResponse
                oneOf:
                - $ref: '#/components/schemas/BrowserList'
                - $ref: '#/components/schemas/BrowserMap'
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /workers:
    get:
      tags:
      - JSTesting
      summary: Fetches all workers.
      description: Fetches all workers.
      operationId: getWorkers
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Worker'
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /worker:
    post:
      tags:
      - JSTesting
      summary: Create a browser worker.
      description: Create a browser worker. A browser worker is simply a new browser
        instance. A user can start multiple browser workers at a time. All browser workers
        when created are pushed in a queue and they run when their turn comes. We make
        sure that your browser worker starts running as soon as possible. Your testing
        time is calculated from the time when browser worker starts running.
      operationId: createWorker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewWorker'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: CreateWorkerResponse
                type: object
                required:
                - id
                properties:
                  id:
                    type: number
                    description: ID of the worker
                    example: 122326697
                  url:
                    type: string
                    description: URL of the worker
                    example: https://www.google.com/ncr
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /worker/{workerId}:
    get:
      tags:
      - JSTesting
      summary: Fetch details of a worker.
      description: Fetch details a worker.
      operationId: getWorker
      parameters:
      - name: workerId
        in: path
        required: true
        description: ID of the worker
        schema:
          type: number
          example: 122326697
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Worker'
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '403':
          $ref: '#/components/schemas/403.Forbidden'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
    delete:
      tags:
      - JSTesting
      summary: Terminate a worker.
      description: Terminate a worker.
      operationId: deleteWorker
      parameters:
      - name: workerId
        in: path
        required: true
        description: ID of the worker
        schema:
          type: number
          example: 122326697
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: DeleteWorkerResponse
                type: object
                required:
                - message
                properties:
                  message:
                    type: string
                    description: Status of the termination operation
                    example: worker is running for 19.405956957 secs, minimum life is
                      30 sec
                  time:
                    type: number
                    description: Duration of the worker
                    example: 45.786373558
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic

  schemas:
    400.BadRequest:
      description: Bad request.
    401.Unauthorized:
      description: Your BrowserStack access credentials are invalid.
    403.Forbidden:
      description: Authorized user is not the owner of the resource.
    404.NotFound:
      description: The requested resource could not be found.
    422.UnprocessableEntity:
      description: Request is well-formed but has semantic errors. The response will provide
        more details about error.
    5xx.InternalServerError:
      description: Indicates an error with BrowserStack servers.
    Browser:
      title: Browser
      type: object
      required:
      - browser
      - browser_version
      properties:
        browser:
          type: string
          example: Chrome
        browser_version:
          type: string
          example: '80.0'
    BrowserDevice:
      title: BrowserDevice
      allOf:
      - $ref: '#/components/schemas/Browser'
      - type: object
        required:
        - devices
        - real_devices
        properties:
          browser:
            type: string
            example: Android Browser
          devices:
            type: array
            items:
              type: string
              example: Google Nexus
          real_devices:
            type: array
            items:
              type: string
            maxItems: 0
    BrowserList:
      title: BrowserList
      type: array
      items:
        $ref: '#/components/schemas/BrowserPlatform'
    BrowserMap:
      title: BrowserMap
      type: object
      properties:
        Windows:
          type: object
          required:
          - XP
          - '7'
          - '8'
          - '8.1'
          - '10'
          - '11'
          properties:
            XP:
              type: array
              items:
                $ref: '#/components/schemas/BrowserPlatform'
            '7':
              type: array
              items:
                $ref: '#/components/schemas/BrowserPlatform'
            '8':
              type: array
              items:
                $ref: '#/components/schemas/BrowserPlatform'
            '8.1':
              type: array
              items:
                $ref: '#/components/schemas/BrowserPlatform'
            '10':
              type: array
              items:
                $ref: '#/components/schemas/BrowserPlatform'
            '11':
              type: array
              items:
                $ref: '#/components/schemas/BrowserPlatform'
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/BrowserPlatform'
        OS X:
          type: object
          required:
          - Snow Leopard
          - Lion
          - Mountain Lion
          - Mavericks
          - Yosemite
          - El Capitan
          - Sierra
          - High Sierra
          - Mojave
          - Catalina
          - Big Sur
          - Monterey
          - Ventura
          - Sonoma
          properties:
            Snow Leopard:
              type: array
              items:
                $ref: '#/components/schemas/BrowserPlatform'
            Lion:
              type: array
              items:
                $ref: '#/components/schemas/BrowserPlatform'
            Mountain Lion:
              type: array
              items:
                $ref: '#/components/schemas/BrowserPlatform'
            Mavericks:
              type: array
              items:
                $ref: '#/components/schemas/BrowserPlatform'
            Yosemite:
              type: array
              items:
                $ref: '#/components/schemas/BrowserPlatform'
            El Capitan:
              type: array
              items:
                $ref: '#/components/schemas/BrowserPlatform'
            Sierra:
              type: array
              items:
                $ref: '#/components/schemas/BrowserPlatform'
            High Sierra:
              type: array
              items:
                $ref: '#/components/schemas/BrowserPlatform'
            Mojave:
              type: array
              items:
                $ref: '#/components/schemas/BrowserPlatform'
            Catalina:
              type: array
              items:
                $ref: '#/components/schemas/BrowserPlatform'
            Big Sur:
              type: array
              items:
                $ref: '#/components/schemas/BrowserPlatform'
            Monterey:
              type: array
              items:
                $ref: '#/components/schemas/BrowserPlatform'
            Ventura:
              type: array
              items:
                $ref: '#/components/schemas/BrowserPlatform'
            Sonoma:
              type: array
              items:
                $ref: '#/components/schemas/BrowserPlatform'
            additionalProperties:
              type: array
              items:
                $ref: '#/components/schemas/BrowserPlatform'
        winphone:
          type: object
          required:
          - '8.1'
          properties:
            '8.1':
              type: array
              items:
                $ref: '#/components/schemas/BrowserDevice'
        android:
          type: object
          required:
          - '14.0'
          - '13.0'
          - '12.0'
          - '11.0'
          - '10.0'
          - '9.0'
          - '8.1'
          - '8.0'
          - '7.1'
          - '7.0'
          - '6.0'
          - '5.0'
          - '4.4'
          - '4.3'
          - '4.2'
          - '4.1'
          - '4.0'
          - '2.3'
          - '2.2'
          properties:
            '14.0':
              type: array
              items:
                $ref: '#/components/schemas/BrowserRealDevice'
            '13.0':
              type: array
              items:
                $ref: '#/components/schemas/BrowserRealDevice'
            '12.0':
              type: array
              items:
                $ref: '#/components/schemas/BrowserRealDevice'
            '11.0':
              type: array
              items:
                $ref: '#/components/schemas/BrowserRealDevice'
            '10.0':
              type: array
              items:
                $ref: '#/components/schemas/BrowserRealDevice'
            '9.0':
              type: array
              items:
                $ref: '#/components/schemas/BrowserRealDevice'
            '8.1':
              type: array
              items:
                $ref: '#/components/schemas/BrowserRealDevice'
            '8.0':
              type: array
              items:
                $ref: '#/components/schemas/BrowserRealDevice'
            '7.1':
              type: array
              items:
                $ref: '#/components/schemas/BrowserRealDevice'
            '7.0':
              type: array
              items:
                $ref: '#/components/schemas/BrowserRealDevice'
            '6.0':
              type: array
              items:
                $ref: '#/components/schemas/BrowserRealDevice'
            '5.0':
              type: array
              items:
                $ref: '#/components/schemas/BrowserDevice'
            '4.4':
              type: array
              items:
                $ref: '#/components/schemas/BrowserDevice'
            '4.3':
              type: array
              items:
                $ref: '#/components/schemas/BrowserDevice'
            '4.2':
              type: array
              items:
                $ref: '#/components/schemas/BrowserDevice'
            '4.1':
              type: array
              items:
                $ref: '#/components/schemas/BrowserDevice'
            '4.0':
              type: array
              items:
                $ref: '#/components/schemas/BrowserDevice'
            '2.3':
              type: array
              items:
                $ref: '#/components/schemas/BrowserDevice'
            '2.2':
              type: array
              items:
                $ref: '#/components/schemas/BrowserDevice'
            additionalProperties:
              type: array
              items:
                oneOf:
                - $ref: '#/components/schemas/BrowserRealDevice'
                - $ref: '#/components/schemas/BrowserDevice'
    BrowserPlatform:
      title: BrowserPlatform
      allOf:
      - $ref: '#/components/schemas/Browser'
      - type: object
        required:
        - os
        - os_version
        properties:
          os:
            type: string
            example: Windows
          os_version:
            type: string
            example: '10'
          device:
            type: string
            example:
          real_mobile:
            type: boolean
            example:
    BrowserRealDevice:
      title: BrowserRealDevice
      allOf:
      - $ref: '#/components/schemas/Browser'
      - type: object
        required:
        - devices
        - real_devices
        properties:
          browser:
            type: string
            example: Android Browser
          devices:
            type: array
            items:
              type: string
            maxItems: 0
          real_devices:
            type: array
            items:
              type: string
              example: Google Pixel 6 Pro
    NewWorker:
      title: NewWorker
      allOf:
      - type: object
        required:
        - url
        - os
        - os_version
        properties:
          url:
            type: string
            description: URL to be opened in the browser
            example: https://www.google.com/ncr
          timeout:
            type: number
            description: 'Time in seconds before the worker is terminated. The default
              value is 300 seconds and the minimum value is 60 seconds. IMPORTANT: Irrespective
              of the timeout parameter, a browser worker is alive for a maximum time of
              1800 seconds.'
            example: 300
          os:
            type: string
            description: Operating system name.
            example: Windows
          os_version:
            type: string
            description: Operating system version.
            example: '10'
          name:
            type: string
            description: Name of the worker.
            example: qunit-test-pricing
          build:
            type: string
            description: Name of the build the session is running under.
            example: staging-build
          project:
            type: string
            description: Name of the project the build is organized under.
            example: pricing-project
          browserstack.video:
            type: boolean
            description: Enable video recording for the session. The default value is
              false.
            example: true
          resolution:
            type: string
            description: Set the resolution of VM before the beginning of your test. Available
              for Desktop only. The default value is 1024x768.
            example: 1024x768
      - oneOf:
        - type: object
          required:
          - browser
          - browser_version
          properties:
            browser:
              type: string
              description: Browser name.
              example: Chrome
            browser_version:
              type: string
              description: Browser version.
              example: '80.0'
        - type: object
          properties:
            device:
              type: string
              description: Device name. If a device is not provided it defaults to the
                first device available for that os version.
              example: iPhone 11 Pro
            browser:
              type: string
              description: Browser name.
              example: Chrome
            browser_version:
              type: string
              description: Browser version.
              example: '80.0'
    Status:
      title: Status
      type: object
      required:
      - used_time
      - running_sessions
      - session_limit
      - total_available_time
      properties:
        used_time:
          type: number
          example: 10
        running_sessions:
          type: number
          example: 0
        session_limit:
          type: number
          example: 0
        total_available_time:
          type: string
          example: Unlimited Testing Time
    Worker:
      title: Worker
      allOf:
      - $ref: '#/components/schemas/BrowserPlatform'
      - type: object
        required:
        - id
        properties:
          id:
            type: number
            description: ID of the worker.
            example: 122326697
          sessionId:
            description: ID of the session.
            example: 550709149fe79e949363b581e774d5ebffa1b8fe
          status:
            type: string
            enum:
            - queue
            - running
            description: Current status of the worker.
            example: running
          browser_url:
            type: string
            description: Dashboard URL of the session
            example: ''
