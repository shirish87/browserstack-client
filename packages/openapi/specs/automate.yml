      description: Fetches list of recently uploaded media files
      operationId: getAutomateMediaFiles
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  $ref: '#/components/schemas/AutomateMediaFile'
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /automate/projects.json:
    get:
      tags:
      - Automate
      summary: Fetches list of projects
      description: Fetches list of projects associated with your username and access
        key. You will need the id of the project for invoking any other Project API
        that follows in this document
      operationId: getAutomateProjects
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AutomateProject'
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /automate/sessions/{sessionId}/consolelogs:
    get:
      tags:
      - Automate
      summary: Fetches console logs for a session
      description: Fetches console logs for a session. Console logs are enabled by default
        and are set to errors. You can disable them or change verbosity options by using
        the browserstack.console capability to disabled, errors, warnings, info, verbose.
        Raw Console Logs for each session are available to you in text format.
      operationId: getAutomateSessionConsoleLogs
      x-response-transform:
        codec: text
      parameters:
      - name: sessionId
        in: path
        description: ID of your session
        required: true
        schema:
          type: string
          example: 4207442b2b0567368956dba064c22a3235a76214
      responses:
        '200':
          description: Successful operation
          content:
            text/plain:
              schema:
                type: string
                description: "Console Logs capture the browser\u2019s JS console output\
                  \ at various steps of the test to troubleshoot JavaScript issues."
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /automate/sessions/{sessionId}/telemetrylogs:
    get:
      tags:
      - Automate
      summary: Fetches telemetry logs for a session
      description: Fetches telemetry logs for a session. Telemetry logs for a session
        are available for tests run using Selenium 4. Telemetry logs are by default
        disabled for a session.
      operationId: getAutomateSessionTelemetryLogs
      x-response-transform:
        codec: binary
      parameters:
      - name: sessionId
        in: path
        description: ID of your session
        required: true
        schema:
          type: string
          example: 4207442b2b0567368956dba064c22a3235a76214
      responses:
        '200':
          description: Successful operation
          content:
            application/octet-stream: {}
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /automate/builds.json:
    get:
      tags:
      - Automate
      summary: Fetches list of builds
      description: Fetch the 10 recent test builds that have run on BrowserStack. You
        can also limit the number of builds and paginate through your data
      operationId: getAutomateBuilds
      x-response-transform:
        codec: json-unwrap
        config:
          path: "$[*].automation_build"
      parameters:
      - name: projectId
        in: query
        description: ID of your project
        required: false
        schema:
          type: number
          example: 966019
      - name: limit
        in: query
        description: Specify the number of results to be displayed. The default value
          is 10, and the maximum value is 100
        required: false
        schema:
          type: number
          example: 10
      - name: offset
        in: query
        description: Retrieve builds from a specific point using the offset parameter
        required: false
        schema:
          type: number
          example: 0
      - name: status
        in: query
        description: Status of the build
        required: false
        schema:
          type: string
          enum:
          - running
          - timeout
          - failed
          - done
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  title: GetAutomateBuildsResponse
                  type: object
                  required:
                  - automation_build
                  properties:
                    automation_build:
                      $ref: '#/components/schemas/AutomateBuild'
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /automate/sessions/{sessionId}/networklogs:
    get:
      tags:
      - Automate
      summary: Fetches network logs for a session
      description: Fetches network logs for a session. Network Logs for each session
        are available to you in HAR (HTTP Archive) format.
      operationId: getAutomateSessionNetworkLogs
      parameters:
      - name: sessionId
        in: path
        description: ID of your session
        required: true
        schema:
          type: string
          example: 4207442b2b0567368956dba064c22a3235a76214
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                description: HAR (HTTP Archive) format
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic

  schemas:
    400.BadRequest:
      description: Bad request.
    401.Unauthorized:
      description: Your BrowserStack access credentials are invalid.
    403.Forbidden:
      description: Authorized user is not the owner of the resource.
    404.NotFound:
      description: The requested resource could not be found.
    422.UnprocessableEntity:
      description: Request is well-formed but has semantic errors. The response will provide
        more details about error.
    5xx.InternalServerError:
      description: Indicates an error with BrowserStack servers.
    AutomateProjectWithBuilds:
      title: AutomateProjectWithBuilds
      allOf:
      - $ref: '#/components/schemas/AutomateProject'
      - type: object
        required:
        - builds
        properties:
          builds:
            type: array
            items:
              $ref: '#/components/schemas/AutomateBuild'
    AutomateBuildContainer:
      title: AutomateBuildContainer
      type: object
      required:
      - automation_build
      - sessions
      properties:
        automation_build:
          $ref: '#/components/schemas/AutomateBuild'
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/AutomateSessionContainer'
    AutomateSessionContainer:
      title: AutomateSessionContainer
      type: object
      required:
      - automation_session
      properties:
        automation_session:
          $ref: '#/components/schemas/AutomateSession'
    AutomateBuild:
      title: AutomateBuild
      type: object
      required:
      - name
      - hashed_id
      - duration
      - status
      - build_tag
      - public_url
      properties:
        name:
          type: string
          description: Name of your build
          example: pricing_project_build
        duration:
          type: number
          description: Duration of build execution
          example: 10
        status:
          type: string
          enum:
          - running
          - timeout
          - failed
          - done
        user_id:
          type: number
          description: Identifier for the user
          example: 256454
        group_id:
          type: number
          description: Identifier for your account or group
          example: 2
        sub_group_id:
          type: number
          description: Identifier for a team in a group
          example: 0
        automation_project_id:
          type: number
          description: ID of your project
          example: 866256
        hashed_id:
          type: string
          description: Hashed ID of the build
          example: 4207442b2b0567368956dba064c22a3235a76214
        build_tag:
          type: string
          description: Tag for the build
          example: pricing_project_build
        delta:
          type: boolean
          description: Indicates whether the build is a delta build
          example: false
        framework:
          type: string
          description: Framework used for the build
          example: selenium
        test_data:
          type: object
          additionalProperties: true
          description: Test data used for the build
        created_at:
          type: string
          description: Time at which the project was created on BrowserStack servers
          example: '2020-03-11T10:14:36.000Z'
        updated_at:
          type: string
          description: Time at which the project was updated on BrowserStack servers
          example: '2020-09-18T09:45:57.000Z'
    AutomateMediaFile:
      title: AutomateMediaFile
      type: object
      required:
      - media_name
      - media_url
      - media_id
      - uploaded_at
      properties:
        media_name:
          type: string
          description: Name of the uploaded media file.
          example: profile.png
        media_url:
          type: string
          description: Unique identifier returned upon successful upload of your media
            file on BrowserStack. This value is used to specify the media files to be
            used in your tests.
          example: media://90c7a8h8dc82308108734e9a46c24d8f01de12881
        media_id:
          type: string
          description: Unique ID returned on successful upload of your media file on BrowserStack.
          example: 90c7a8h8dc82308108734e9a46c24d8f01de12881
        uploaded_at:
          type: string
          description: Media upload timestamp.
          example: '2021-10-13T10:30:00.000Z'
    AutomateProject:
      title: AutomateProject
      type: object
      required:
      - id
      - name
      - user_id
      - group_id
      - sub_group_id
      - created_at
      - updated_at
      properties:
        id:
          type: number
          description: ID of your project
          example: 866256
        name:
          type: string
          description: Name of your project
          example: pricing_project
        user_id:
          type: number
          description: Identifier for the user
          example: 256454
        group_id:
          type: number
          description: Identifier for your account or group
          example: 2
        sub_group_id:
          type: number
          description: Identifier for a team in a group
          example: 0
        created_at:
          type: string
          description: Time at which the project was created on BrowserStack servers
          example: '2020-03-11T10:14:36.000Z'
        updated_at:
          type: string
          description: Time at which the project was updated on BrowserStack servers
          example: '2020-09-18T09:45:57.000Z'
    Browser:
      title: Browser
      type: object
      required:
      - browser
      - browser_version
      properties:
        browser:
          type: string
          example: Chrome
        browser_version:
          type: string
          example: '80.0'
    BrowserDevice:
      title: BrowserDevice
      allOf:
      - $ref: '#/components/schemas/Browser'
      - type: object
        required:
        - devices
        - real_devices
        properties:
          browser:
            type: string
            example: Android Browser
          devices:
            type: array
            items:
              type: string
              example: Google Nexus
          real_devices:
            type: array
            items:
              type: string
            maxItems: 0
    BrowserList:
      title: BrowserList
      type: array
      items:
        $ref: '#/components/schemas/BrowserPlatform'
    BrowserPlatform:
      title: BrowserPlatform
      allOf:
      - $ref: '#/components/schemas/Browser'
      - type: object
        required:
        - os
        - os_version
        properties:
          os:
            type: string
            example: Windows
          os_version:
            type: string
            example: '10'
          device:
            type: string
            example:
          real_mobile:
            type: boolean
            example:
    BrowserRealDevice:
      title: BrowserRealDevice
      allOf:
      - $ref: '#/components/schemas/Browser'
      - type: object
        required:
        - devices
        - real_devices
        properties:
          browser:
            type: string
            example: Android Browser
          devices:
            type: array
            items:
              type: string
            maxItems: 0
          real_devices:
            type: array
            items:
              type: string
              example: Google Pixel 6 Pro
    NewWorker:
      title: NewWorker
      allOf:
      - type: object
        required:
        - url
        - os
        - os_version
        properties:
          url:
            type: string
            description: URL to be opened in the browser
            example: https://www.google.com/ncr
          timeout:
            type: number
            description: 'Time in seconds before the worker is terminated. The default
              value is 300 seconds and the minimum value is 60 seconds. IMPORTANT: Irrespective
              of the timeout parameter, a browser worker is alive for a maximum time of
              1800 seconds.'
            example: 300
          os:
            type: string
            description: Operating system name.
            example: Windows
          os_version:
            type: string
            description: Operating system version.
            example: '10'
          name:
            type: string
            description: Name of the worker.
            example: qunit-test-pricing
          build:
            type: string
            description: Name of the build the session is running under.
            example: staging-build
          project:
            type: string
            description: Name of the project the build is organized under.
            example: pricing-project
          browserstack.video:
            type: boolean
            description: Enable video recording for the session. The default value is
              false.
            example: true
          resolution:
            type: string
            description: Set the resolution of VM before the beginning of your test. Available
              for Desktop only. The default value is 1024x768.
            example: 1024x768
      - oneOf:
        - type: object
          required:
          - browser
          - browser_version
          properties:
            browser:
              type: string
              description: Browser name.
              example: Chrome
            browser_version:
              type: string
              description: Browser version.
              example: '80.0'
        - type: object
          properties:
            device:
              type: string
              description: Device name. If a device is not provided it defaults to the
                first device available for that os version.
              example: iPhone 11 Pro
            browser:
              type: string
              description: Browser name.
              example: Chrome
            browser_version:
              type: string
              description: Browser version.
              example: '80.0'
    Status:
      title: Status
      type: object
      required:
      - used_time
      - running_sessions
      - session_limit
      - total_available_time
      properties:
        used_time:
          type: number
          example: 10
        running_sessions:
          type: number
          example: 0
        session_limit:
          type: number
          example: 0
        total_available_time:
          type: string
          example: Unlimited Testing Time
    Worker:
      title: Worker
      allOf:
      - $ref: '#/components/schemas/BrowserPlatform'
      - type: object
        required:
        - id
        properties:
          id:
            type: number
            description: ID of the worker.
            example: 122326697
          sessionId:
            type: string
            description: ID of the session.
            example: 550709149fe79e949363b581e774d5ebffa1b8fe
          status:
            type: string
            enum:
            - queue
            - running
            description: Current status of the worker.
            example: running
          browser_url:
            type: string
            description: Dashboard URL of the session
            example: ''
