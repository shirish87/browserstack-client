servers:
  - url: "{scheme}://{host}{basePath}"
    variables:
      scheme:
        default: https
      host:
        default: api.browserstack.com
      basePath:
        default: "/5"
  - url: "{scheme}://{host}"
    variables:
      scheme:
        default: https
      host:
        default: api-cloud.browserstack.com

openapi: 3.0.2
info:
  title: BrowserStack Automate
  version: 5.0.0
  description: BrowserStack Automate API
  license:
    name: MIT License
    url: https://opensource.org/license/mit/

externalDocs:
  description: Find out more about BrowserStack
  url: https://www.browserstack.com/docs/


security:
  - basicAuth: []

paths:
  /automate/browsers.json:
    get:
      tags:
      - Automate
      summary: Fetches all automate browsers.
      description: Fetches all automate browsers.
      operationId: getAutomateBrowsers
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowserList'
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /automate/plan.json:
    get:
      tags:
      - Automate
      summary: Get Automate plan details
      description: Fetches Automate plan details
      operationId: getAutomatePlan
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomatePlan'
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /automate/sessions/{sessionId}/appiumlogs:
    get:
      tags:
      - Automate
      summary: Fetches Appium logs for a session
      description: Fetches Appium logs for a session. Raw Appium Logs for each session
        are available to you in text format.
      operationId: getAutomateSessionAppiumLogs
      x-response-transform:
        codec: text
      parameters:
      - name: sessionId
        in: path
        description: ID of your session
        required: true
        schema:
          type: string
          example: 4207442b2b0567368956dba064c22a3235a76214
      responses:
        '200':
          description: Successful operation
          content:
            text/plain:
              schema:
                type: string
                description: Appium Logs captures the raw Appium Logs for your test
                  execution.
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /automate/projects/{projectId}/badge_key:
    get:
      tags:
      - Automate
      summary: Fetches the badge key for the project
      description: Fetches the badge key for sharing a public link for the Automate
        dashboard to view the latest build and sessions for that project
      operationId: getAutomateProjectBadgeKey
      x-response-transform:
        codec: text
      parameters:
      - name: projectId
        in: path
        description: ID of your project
        required: true
        schema:
          type: number
          example: 966019
      responses:
        '200':
          description: Successful operation
          content:
            text/plain:
              schema:
                type: string
              examples:
                badge_key:
                  value: VnZ6dGxkRGxGc1RIY01iZGZBVjJBNTA2R0s4ZUhiZkg2cnB...
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /automate/sessions/{sessionId}/terminallogs:
    post:
      tags:
      - Automate
      summary: Upload terminal logs for your session.
      description: Upload terminal logs for your session.
      operationId: uploadAutomateSessionTerminalLogs
      x-base-url: sdkCloud
      x-request-transform:
        codec: multipart
        config:
          fileField: file
          filenameFrom: "$.file_name"
      x-response-transform:
        codec: text
      parameters:
      - name: sessionId
        in: path
        description: ID of your session
        required: true
        schema:
          type: string
          example: 4207442b2b0567368956dba064c22a3235a76214
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              title: UploadAutomateSessionTerminalLogsRequest
              type: object
              required:
              - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Path to the terminal log file on your machine. The max
                    allowed file size is 2MB
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: UploadAutomateSessionTerminalLogsResponse
                type: object
                required:
                - message
                properties:
                  message:
                    type: string
                    description: Message indicating upload result.
                    example: File has been uploaded successfully!
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /automate/builds:
    delete:
      tags:
      - Automate
      summary: Delete multiple builds on the server
      description: Delete multiple builds on the server. You can delete a maximum of
        5 builds at a time. Builds once deleted cannot be recovered.
      operationId: deleteAutomateBuilds
      parameters:
      - name: buildId[]
        in: query
        description: IDs of your builds
        required: true
        schema:
          type: array
          items:
            type: string
            example: 83078c39baf5c12cbbfcbd26a788d05ddfad626c
          maxItems: 5
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: DeleteAutomateBuildsResponse
                type: object
                properties:
                  message:
                    type: string
                    description: Message indicating the deletion of the builds
                    example: 'The following build(s) were deleted successfully: 83078c39baf5c12cbbfcbd26a788d05ddfad626c,55e9782d749f601d09571023f56a8f0101929428.'
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /automate/sessions/{sessionId}.json:
    get:
      tags:
      - Automate
      summary: Fetches a session
      description: Fetches a session for a particular build
      operationId: getAutomateSession
      x-response-transform:
        codec: json-unwrap
        config:
          path: "$.automation_session"
      parameters:
      - name: sessionId
        in: path
        description: ID of your session
        required: true
        schema:
          type: string
          example: 4207442b2b0567368956dba064c22a3235a76214
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: GetAutomateSessionResponse
                type: object
                required:
                - automation_session
                properties:
                  automation_session:
                    $ref: '#/components/schemas/AutomateSession'
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
    put:
      tags:
      - Automate
      summary: Update session status or name
      description: Set the status for a session or update the name of the session. You
        can mark test status as passed or failed along with a reason.
      operationId: updateAutomateSession
      x-response-transform:
        codec: json-unwrap
        config:
          path: "$.automation_session"
      parameters:
      - name: sessionId
        in: path
        description: ID of your session
        required: true
        schema:
          type: string
          example: 4207442b2b0567368956dba064c22a3235a76214
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: UpdateAutomateSessionRequest
              oneOf:
              - type: object
                required:
                - status
                - reason
                properties:
                  status:
                    type: string
                    description: Status of the session
                    enum:
                    - passed
                    - failed
                    example: passed
                  reason:
                    type: string
                    description: Reason for marking the session as failed
                    example: Test failed because of assertion error
              - type: object
                required:
                - name
                properties:
                  name:
                    type: string
                    description: Name of the session
                    example: Pricing Demo
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: UpdateAutomateSessionResponse
                type: object
                required:
                - automation_session
                properties:
                  automation_session:
                    $ref: '#/components/schemas/AutomateSession'
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
    delete:
      tags:
      - Automate
      summary: Delete a session on the server
      description: Delete a session on the server. Sessions once deleted cannot be recovered
      operationId: deleteAutomateSession
      parameters:
      - name: sessionId
        in: path
        description: ID of your session
        required: true
        schema:
          type: string
          example: 4207442b2b0567368956dba064c22a3235a76214
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: DeleteAutomateSessionResponse
                type: object
                properties:
                  status:
                    type: string
                    description: Status of deletion
                    example: ok
                  message:
                    type: string
                    description: Message indicating the deletion of the session
                    example: Session 4207442b2b0567368956dba064c22a3235a76214 was deleted
                      successfully.
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /automate/sessions:
    delete:
      tags:
      - Automate
      summary: Delete multiple sessions on the server
      description: Delete multiple sessions on the server. Sessions once deleted cannot
        be recovered.
      operationId: deleteAutomateSessions
      parameters:
      - name: sessionId[]
        in: query
        description: IDs of your sessions
        required: true
        schema:
          type: array
          items:
            type: string
            example: 83078c39baf5c12cbbfcbd26a788d05ddfad626c
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: DeleteAutomateSessionsResponse
                type: object
                properties:
                  message:
                    type: string
                    description: Message indicating the deletion of the sessions
                    example: 'The following session(s) were deleted successfully: 83078c39baf5c12cbbfcbd26a788d05ddfad626c,55e9782d749f601d09571023f56a8f0101929428.'
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /automate/custom_media/delete/{mediaId}:
    delete:
      tags:
      - Automate
      summary: Delete a media file earlier uploaded to BrowserStack
      description: Delete a media file on the server. Media files once deleted cannot
        be recovered
      operationId: deleteAutomateMediaFile
      parameters:
      - name: mediaId
        in: path
        description: ID of your media file
        required: true
        schema:
          type: string
          example: 90c7a8h8dc82308108734e9a46c24d8f01de12881
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: DeleteAutomateMediaFileResponse
                type: object
                required:
                - success
                properties:
                  success:
                    type: boolean
                    description: Status of deletion
                    example: true
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /automate/builds/{buildId}.json:
    get:
      tags:
      - Automate
      summary: Fetches a build
      description: Fetches a build
      operationId: getAutomateBuild
      x-response-transform:
        codec: json-compose
        config:
          base: "$.build.automation_build"
          merge:
            sessions: "$.build.sessions[*].automation_session"
      parameters:
      - name: buildId
        in: path
        description: ID of your build
        required: true
        schema:
          type: string
          example: a4fb480a55efd6b3c558afb1ee051a7c337b8ef0
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: GetAutomateBuildResponse
                type: object
                required:
                - build
                properties:
                  build:
                    title: AutomateBuildContainer
                    type: object
                    required:
                    - automation_build
                    - sessions
                    properties:
                      automation_build:
                        $ref: '#/components/schemas/AutomateBuild'
                      sessions:
                        type: array
                        items:
                          $ref: '#/components/schemas/AutomateSessionContainer'
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '403':
          $ref: '#/components/schemas/403.Forbidden'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
    put:
      tags:
      - Automate
      summary: Update the name or tag of your build
      description: Update the name or tag of your build after the build is complete.
        To delete a build tag, simply pass an empty string as value for build_tag.
      operationId: updateAutomateBuild
      parameters:
      - name: buildId
        in: path
        description: ID of your build
        required: true
        schema:
          type: string
          example: a4fb480a55efd6b3c558afb1ee051a7c337b8ef0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: UpdateAutomateBuildRequest
              type: object
              anyOf:
              - required:
                - name
              - required:
                - build_tag
              properties:
                name:
                  type: string
                  description: The new build name that you want to set. Accepted characters
                    are A-Z, a-z, 0-9, ., :, -, [], /, @, &, ', _. Character limit is
                    255.
                  example: Selenium test
                build_tag:
                  type: string
                  description: The new build tag that you want to set
                  example: registration
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: UpdateAutomateBuildResponse
                oneOf:
                - type: object
                  required:
                  - automation_build
                  properties:
                    automation_build:
                      $ref: '#/components/schemas/AutomateBuild'
                - type: object
                  required:
                  - error
                  properties:
                    error:
                      type: string
                      description: Error message
                      example: A build with this name already exists.
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
    delete:
      tags:
      - Automate
      summary: Delete a build on the server
      description: Delete a build on the server. Please note that deleting a build will
        delete all the sessions contained within it. Builds once deleted cannot be recovered
      operationId: deleteAutomateBuild
      parameters:
      - name: buildId
        in: path
        description: ID of your build
        required: true
        schema:
          type: string
          example: a4fb480a55efd6b3c558afb1ee051a7c337b8ef0
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: DeleteAutomateBuildResponse
                type: object
                properties:
                  status:
                    type: string
                    description: Status of deletion
                    example: ok
                  message:
                    type: string
                    description: Message indicating the deletion of the build
                    example: Build a4fb480a55efd6b3c558afb1ee051a7c337b8ef0 was deleted
                      successfully.
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /automate/sessions/{sessionId}/logs:
    get:
      tags:
      - Automate
      summary: Fetches session logs
      description: Fetches session logs. Whenever you execute a session on BrowserStack,
        a session log is generated. These logs are available to you in text format.
      operationId: getAutomateSessionLogs
      x-response-transform:
        codec: text
      parameters:
      - name: sessionId
        in: path
        description: ID of your session
        required: true
        schema:
          type: string
          example: 4207442b2b0567368956dba064c22a3235a76214
      responses:
        '200':
          description: Successful operation
          content:
            text/plain:
              schema:
                type: string
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /automate/upload-media:
    post:
      tags:
      - Automate
      summary: Upload a media file
      description: Upload a media file you want to use in your tests
      operationId: uploadAutomateMediaFile
      x-request-transform:
        codec: multipart
        config:
          fileField: file
          filenameFrom: "$.file_name"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              title: UploadAutomateMediaFileRequest
              type: object
              required:
              - file
              properties:
                file:
                  type: string
                  format: binary
                  description: 'Path to the media file on your machine. Note: You can
                    upload up to 10 media files on the BrowserStack server. By default,
                    we delete the uploaded files after 30 days from the date of upload.'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: UploadAutomateMediaFileResponse
                type: object
                required:
                - media_url
                properties:
                  media_url:
                    type: string
                    description: Unique identifier returned upon successful upload of
                      your media file on BrowserStack. This value is used to specify
                      the media files to be used in your tests.
                    example: media://90c7a8h8dc82308108734e9a46c24d8f01de12881
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /automate/recycle_key.json:
    put:
      tags:
      - Automate
      summary: Reset Automate access key
      description: Reset Automate access key
      operationId: recycleAutomateKey
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: RecycleAutomateKeyResponse
                type: object
                required:
                - old_key
                - new_key
                properties:
                  old_key:
                    type: string
                    example: mkALWJIMwtzJOqyqONyq
                  new_key:
                    type: string
                    example: OQMCfsukIHWoNSOWAqkv
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /automate/builds/{buildId}/sessions.json:
    get:
      tags:
      - Automate
      summary: Fetches list of sessions
      description: Fetches list of sessions for a particular build
      operationId: getAutomateSessions
      x-response-transform:
        codec: json-unwrap
        config:
          path: "$[*].automation_session"
      parameters:
      - name: buildId
        in: path
        description: ID of your build
        required: true
        schema:
          type: string
          example: a4fb480a55efd6b3c558afb1ee051a7c337b8ef0
      - name: limit
        in: query
        description: Specify the number of results to be displayed. The default value
          is 10, and the maximum value is 100
        required: false
        schema:
          type: number
          example: 10
      - name: offset
        in: query
        description: Retrieve sessions from a specific point using the offset parameter
        required: false
        schema:
          type: number
          example: 0
      - name: status
        in: query
        description: Status of the session
        required: false
        schema:
          type: string
          enum:
          - running
          - timeout
          - failed
          - done
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: GetAutomateSessionsResponse
                type: array
                items:
                  $ref: '#/components/schemas/AutomateSessionContainer'
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /automate/projects/{projectId}.json:
    get:
      tags:
      - Automate
      summary: Fetches a project
      description: Specific information about a particular project can be queried using
        the project ID
      operationId: getAutomateProject
      x-response-transform:
        codec: json-unwrap
        config:
          path: "$.project"
      parameters:
      - name: projectId
        in: path
        description: ID of your project
        required: true
        schema:
          type: number
          example: 966019
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: GetAutomateProjectResponse
                type: object
                required:
                - project
                properties:
                  project:
                    $ref: '#/components/schemas/AutomateProjectWithBuilds'
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
    put:
