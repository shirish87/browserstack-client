        that to delete a project, it needs to be empty of builds and sessions, and projects
        once deleted cannot be recovered
      operationId: deleteAutomateProject
      parameters:
      - name: projectId
        in: path
        description: ID of your project
        required: true
        schema:
          type: number
          example: 966019
      responses:
