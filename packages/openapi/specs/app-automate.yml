components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    400.BadRequest:
      description: Bad request.
    401.Unauthorized:
      description: Your BrowserStack access credentials are invalid.
    403.Forbidden:
      description: Authorized user is not the owner of the resource.
    404.NotFound:
      description: The requested resource could not be found.
    422.UnprocessableEntity:
      description: Request is well-formed but has semantic errors. The response will
        provide more details about error.
    5xx.InternalServerError:
      description: Indicates an error with BrowserStack servers.
    AppAutomateApp:
      title: AppAutomateApp
      type: object
      required:
      - app_url
      properties:
        app_id:
          type: string
          description: Unique ID returned on successful upload of your app on BrowserStack.
          example: 90c7a8h8dc82308108734e9a46c24d8f01de12881
        app_url:
          type: string
          description: Unique identifier returned upon successful upload of your app
            on BrowserStack. This value can be used later to specify the application
            under test in your Appium test scripts.
          example: media://90c7a8h8dc82308108734e9a46c24d8f01de12881
        app_name:
          type: string
          description: Name of the app file uploaded.
          example: app-release.apk
        app_version:
          type: string
          description: Version of the app.
          example: 1.0.0
        uploaded_at:
          type: string
          description: Timestamp of the app file upload.
          example: '2021-09-30T10:00:00.000Z'
        expiry:
          type: string
          description: Timestamp of the app file expiry.
          example: '2021-09-30T10:00:00.000Z'
        custom_id:
          type: string
          description: Custom ID defined for the uploaded app. Accepted characters
            are A-Z, a-z, 0-9, ., -, _. All other characters are ignored. Character
            limit is 100.
          example: media_1
        shareable_id:
          type: string
          description: Shareable ID allows other users in your organization to test
            an app you uploaded.
          example: steve/SampleApp
    AppAutomateDevice:
      title: AppAutomateDevice
      type: object
      required:
      - os
      - os_version
      - device
      - real_mobile
      properties:
        os:
          type: string
          example: ios
        os_version:
          type: string
          example: '14'
        device:
          type: string
          example: iPad Pro 12.9 2021
        real_mobile:
          type: boolean
          example: true
    AppAutomateMediaFile:
      title: AppAutomateMediaFile
      type: object
      required:
      - media_id
      - media_url
      properties:
        media_id:
          type: string
          description: Unique ID returned on successful upload of your media file
            on BrowserStack.
          example: 90c7a8h8dc82308108734e9a46c24d8f01de12881
        media_url:
          type: string
          description: Unique identifier returned upon successful upload of your media
            file on BrowserStack. This value is used to specify the media files to
            be used in your tests.
          example: media://90c7a8h8dc82308108734e9a46c24d8f01de12881
        media_name:
          type: string
          description: Name of the media file uploaded.
          example: media.jpg
        uploaded_at:
          type: string
          description: Timestamp of the media file upload.
          example: '2021-09-30T10:00:00.000Z'
        custom_id:
          type: string
          description: Custom ID of the media file uploaded. Accepted characters are
            A-Z, a-z, 0-9, ., -, _. All other characters are ignored. Character limit
            is 100.
          example: media_1
        shareable_id:
          type: string
          description: Shareable ID allows members of other teams to use the media
            files in their tests.
          example: steve/SampleMedia
    AppAutomateSession:
      title: AppAutomateSession
      allOf:
      - type: object
        $ref: '#/components/schemas/AutomateSession'
      - type: object
        required:
        - app_details
        properties:
          app_details:
            type: object
            properties:
              app_name:
                type: string
                description: Package name of the app.
                example: com.sample.loginapplication
              app_version:
                type: string
                description: Version of the app.
                example: '1.0'
              app_url:
                type: string
                description: Unique identifier returned upon successful upload of
                  your app on BrowserStack. This value can be used later to specify
                  the application under test in your Appium test scripts."
                example: media://90c7a8h8dc82308108734e9a46c24d8f01de12881
              app_custom_id:
                type: string
                description: Custom ID defined for the uploaded app.
                example: LoginApp
              uploaded_at:
                type: string
                description: Timestamp of the app upload.
                example: '2021-09-30T10:00:00.000Z'
    AppAutomateTestPackage:
      title: AppAutomateTestPackage
      type: object
      required:
      - test_package_url
      properties:
        test_package_id:
          type: string
          description: Unique ID returned on successful upload of your app on BrowserStack.
          example: 90c7a8h8dc82308108734e9a46c24d8f01de12881
        test_package_url:
          type: string
          description: Unique identifier returned upon successful upload of your app
            on BrowserStack. This value can be used later to specify the application
            under test in your Appium test scripts.
          example: media://90c7a8h8dc82308108734e9a46c24d8f01de12881
        test_package_name:
          type: string
          description: Name of the media file uploaded.
          example: media.zip
        uploaded_at:
          type: string
          description: Timestamp of the media file upload.
          example: '2021-09-30T10:00:00.000Z'
        custom_id:
          type: string
          description: Custom ID defined for the uploaded app. Accepted characters
            are A-Z, a-z, 0-9, ., -, _. All other characters are ignored. Character
            limit is 100.
          example: media_1
        shareable_id:
          type: string
          description: Shareable ID allows other users in your organization to test
            an app you uploaded.
          example: steve/SampleApp
