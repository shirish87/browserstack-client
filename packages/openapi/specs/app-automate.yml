        required: true
        schema:
          type: string
          example: 4207442b2b0567368956dba064c22a3235a76214
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              title: UploadAppAutomateSessionTerminalLogsRequest
              type: object
              required:
              - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Path to the terminal log file on your machine. The
