servers:
- url: '{scheme}://{host}{basePath}'
  variables:
    scheme:
      default: https
    host:
      default: api.browserstack.com
    basePath:
      default: /5
- url: '{scheme}://{host}'
  variables:
    scheme:
      default: https
    host:
      default: api-cloud.browserstack.com
openapi: 3.0.2
info:
  title: BrowserStack App Automate
  version: 5.0.0
  description: BrowserStack App Automate API
  license:
    name: MIT License
    url: https://opensource.org/license/mit/
externalDocs:
  description: Find out more about BrowserStack
  url: https://www.browserstack.com/docs/
security:
- basicAuth: []
paths:
  /app-automate/builds/{buildId}.json:
    get:
      tags:
      - AppAutomate
      summary: Fetches a build
      description: Fetches a build
      operationId: getAppAutomateBuild
      parameters:
      - name: buildId
        in: path
        description: ID of your build
        required: true
        schema:
          type: string
          example: a4fb480a55efd6b3c558afb1ee051a7c337b8ef0
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: GetAppAutomateBuildResponse
                type: object
                required:
                - build
                properties:
                  build:
                    type: object
                    required:
                    - automation_build
                    - sessions
                    properties:
                      automation_build:
                        $ref: '#/components/schemas/AutomateBuild'
                      sessions:
                        type: array
                        items:
                          type: object
                          required:
                          - automation_session
                          properties:
                            automation_session:
                              $ref: '#/components/schemas/AutomateSession'
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '403':
          $ref: '#/components/schemas/403.Forbidden'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
      x-response-transform: json-unwrap $.build
    put:
      tags:
      - AppAutomate
      summary: Update the tag of your build
      description: Update the tag of your build after the build is complete. To delete
        a build tag, simply pass an empty string as value for build_tag.
      operationId: updateAppAutomateBuild
      parameters:
      - name: buildId
        in: path
        description: ID of your build
        required: true
        schema:
          type: string
          example: a4fb480a55efd6b3c558afb1ee051a7c337b8ef0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: UpdateAppAutomateBuildRequest
              type: object
              required:
              - build_tag
              properties:
                build_tag:
                  type: string
                  description: The new build tag that you want to set
                  example: registration
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: UpdateAppAutomateBuildResponse
                oneOf:
                - type: object
                  required:
                  - automation_build
                  properties:
                    automation_build:
                      $ref: '#/components/schemas/AutomateBuild'
                - type: object
                  required:
                  - error
                  properties:
                    error:
                      type: string
                      description: Error message
                      example: A build with this name already exists.
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
    delete:
      tags:
      - AppAutomate
      summary: Delete a build on the server
      description: Delete a build on the server. Please note that deleting a build
        will delete all the sessions contained within it. Builds once deleted cannot
        be recovered
      operationId: deleteAppAutomateBuild
      parameters:
      - name: buildId
        in: path
        description: ID of your build
        required: true
        schema:
          type: string
          example: a4fb480a55efd6b3c558afb1ee051a7c337b8ef0
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: DeleteAppAutomateBuildResponse
                type: object
                properties:
                  status:
                    type: string
                    description: Status of deletion
                    example: ok
                  message:
                    type: string
                    description: Message indicating the deletion of the build
                    example: Build a4fb480a55efd6b3c558afb1ee051a7c337b8ef0 was deleted
                      successfully.
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /app-automate/recent_media_files/{customId}:
    get:
      tags:
      - AppAutomate
      summary: Fetches list of uploaded media files by custom ID
      description: Fetches list of recently uploaded media files by custom ID
      operationId: getAppAutomateMediaFilesByCustomId
      parameters:
      - name: customId
        in: path
        description: Filter recently uploaded media files by custom ID.
        required: true
        schema:
          type: string
          example: media_1
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: GetAppAutomateMediaFilesByCustomIdResponse
                oneOf:
                - type: array
                  items:
                    type: object
                    $ref: '#/components/schemas/AppAutomateMediaFile'
                - type: object
                  required:
                  - message
                  properties:
                    message:
                      type: string
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /app-automate/builds/{buildId}/sessions/{sessionId}/logs:
    get:
      tags:
      - AppAutomate
      summary: Fetches session logs
      description: "Access the logs for the session in textual format. It includes\
        \ information about the test session\u2019s desired capabilities and detailed\
        \ information about every request and response. You can view all the steps\
        \ executed in the test and troubleshoot errors for any failed steps."
      operationId: getAppAutomateSessionLogs
      parameters:
      - name: buildId
        in: path
        description: ID of your build
        required: true
        schema:
          type: string
          example: a4fb480a55efd6b3c558afb1ee051a7c337b8ef0
      - name: sessionId
        in: path
        description: ID of your session
        required: true
        schema:
          type: string
          example: 4207442b2b0567368956dba064c22a3235a76214
      responses:
        '200':
          description: Successful operation
          content:
            text/plain:
              schema:
                type: string
                description: The response will be text/plain logs comprising the details
                  of each request and response in the session execution.
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
      x-response-transform: text
  /app-automate/recent_apps:
    get:
      tags:
      - AppAutomate
      summary: Fetches list of uploaded apps
      description: Fetches list of recently uploaded apps
      operationId: getAppAutomateApps
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: GetAppAutomateAppsResponse
                oneOf:
                - type: array
                  items:
                    type: object
                    $ref: '#/components/schemas/AppAutomateApp'
                - type: object
                  required:
                  - message
                  properties:
                    message:
                      type: string
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /app-automate/recent_group_media:
    get:
      tags:
      - AppAutomate
      summary: Fetches list of uploaded media files for the entire group
      description: Fetches list of recently uploaded media files for the entire group
      operationId: getAppAutomateGroupMediaFiles
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: GetAppAutomateGroupMediaFilesResponse
                oneOf:
                - type: array
                  items:
                    type: object
                    $ref: '#/components/schemas/AppAutomateMediaFile'
                - type: object
                  required:
                  - message
                  properties:
                    message:
                      type: string
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /app-automate/xcuitest/v2/apps/{appId}:
    get:
      tags:
      - AppAutomate
      summary: Get details of an uploaded XCUITest app
      description: Get details of an uploaded XCUITest app
      operationId: getAppAutomateXCUITestApp
      parameters:
      - name: appId
        in: path
        description: App ID of your app
        required: true
        schema:
          type: string
          example: e5b3d27df5d02c367b1469709525dc20da41e65b
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: GetAppAutomateXCUITestAppResponse
                type: object
                required:
                - app
                properties:
                  app:
                    type: object
                    $ref: '#/components/schemas/AppAutomateApp'
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
      x-response-transform: json-unwrap $.app
    delete:
      tags:
      - AppAutomate
      summary: Delete a XCUITest app that was previously uploaded to BrowserStack
      description: Delete an app that was previously uploaded to BrowserStack. Note
        that apps once deleted cannot be recovered.
      operationId: deleteAppAutomateXCUITestApp
      parameters:
      - name: appId
        in: path
        description: ID of your uploaded app
        required: true
        schema:
          type: string
          example: c8ddcb5649a8280ca800075bfd8f151115bba6b3
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: DeleteAppAutomateXCUITestAppResponse
                type: object
                required:
                - success
                properties:
                  success:
                    type: object
                    required:
                    - message
                    properties:
                      message:
                        type: string
                        description: Indicates whether deletion was success or a failure.
                        example: App with url bs://231e820c35ee15b8438ec31df1fb689c03abd8e5
                          was deleted.
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /app-automate/builds/{buildId}/sessions/{sessionId}/networklogs:
    get:
      tags:
      - AppAutomate
      summary: Fetches network logs
      description: Access the network logs for your session. These logs capture network
        data such as network traffic, latency, HTTP requests/responses in the HAR
        (HTTP Archive) format. You can identify any performance bottlenecks or debug
        failed REST API responses. Network logs are disabled by default.
      operationId: getAppAutomateNetworkLogs
      parameters:
      - name: buildId
        in: path
        description: ID of your build
        required: true
        schema:
          type: string
          example: a4fb480a55efd6b3c558afb1ee051a7c337b8ef0
      - name: sessionId
        in: path
        description: ID of your session
        required: true
        schema:
          type: string
          example: 4207442b2b0567368956dba064c22a3235a76214
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                description: HAR (HTTP Archive) format
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /app-automate/builds/{buildId}/terminallogs:
    post:
      tags:
      - AppAutomate
      summary: Upload terminal logs for your build.
      description: Upload terminal logs for your build.
      operationId: uploadAppAutomateBuildTerminalLogs
      x-request-transform:
        codec: multipart
        config:
          fileField: file
          filenameFrom: "$.file_name"
      x-response-transform:
        codec: text
      parameters:
      - name: buildId
        in: path
        description: ID of your build
        required: true
        schema:
          type: string
          example: a4fb480a55efd6b3c558afb1ee051a7c337b8ef0
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              title: UploadAppAutomateBuildTerminalLogsRequest
              type: object
              required:
              - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Path to the terminal log file on your machine. The
                    max allowed file size is 2MB
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                title: UploadAppAutomateBuildTerminalLogsResponse
                type: object
                required:
                - message
                properties:
                  message:
                    type: string
                    description: Message indicating upload result.
                    example: File has been uploaded successfully!
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /app-automate/flutter-integration-tests/v2/android/app:
    post:
      tags:
      - AppAutomate
      summary: Upload an app
      description: Upload the application under test (AUT) for Flutter testing.
      operationId: uploadAppAutomateFlutterAndroidApp
      x-request-transform:
        codec: multipart
        config:
          fileField: file
          filenameFrom: "$.file_name"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              title: UploadAppAutomateFlutterAndroidAppRequest
              allOf:
              - type: object
                properties:
                  custom_id:
                    type: string
                    description: Custom ID for the app. Accepted characters are A-Z,
                      a-z, 0-9, ., -, _. All other characters are ignored. Character
                      limit is 100.
                    example: app_1
              - oneOf:
                - type: object
                  required:
                  - file
                  properties:
                    file:
                      type: string
                      format: binary
                      description: Path to the app file on your machine. Supported
                        file formats are .apk and .aab files for Android and .ipa
                        file for iOS
                - type: object
                  required:
                  - url
                  properties:
                    url:
                      type: string
                      description: URL of the app file. Ensure that its a publicly
                        accessible URL as BrowserStack will attempt to download the
                        app from this location. Supported file formats are .apk and
                        .aab files for Android and .ipa file for iOS
                      example: https://example.com/app.ipa
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppAutomateApp'
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /app-automate/detox/v2/android/app:
    post:
      tags:
      - AppAutomate
      summary: Upload an app
      description: Upload the application under test (AUT) for Detox Android testing.
      operationId: uploadAppAutomateDetoxAndroidApp
      x-request-transform:
        codec: multipart
        config:
          fileField: file
          filenameFrom: "$.file_name"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              title: UploadAppAutomateDetoxAndroidAppRequest
              allOf:
              - type: object
                properties:
                  custom_id:
                    type: string
                    description: Custom ID for the app. Accepted characters are A-Z,
                      a-z, 0-9, ., -, _. All other characters are ignored. Character
                      limit is 100.
                    example: app_1
              - oneOf:
                - type: object
                  required:
                  - file
                  properties:
                    file:
                      type: string
                      format: binary
                      description: Path to the app file on your machine. Supported
                        file formats are .apk and .aab files for Android and .ipa
                        file for iOS
                - type: object
                  required:
                  - url
                  properties:
                    url:
                      type: string
                      description: URL of the app file. Ensure that its a publicly
                        accessible URL as BrowserStack will attempt to download the
                        app from this location. Supported file formats are .apk and
                        .aab files for Android and .ipa file for iOS
                      example: https://example.com/app.ipa
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppAutomateApp'
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /app-automate/xcuitest/v2/apps:
    get:
      tags:
      - AppAutomate
      summary: Fetches list of uploaded XCUITest apps
      description: Fetches list of recently uploaded XCUITest apps
      operationId: getAppAutomateXCUITestApps
      parameters:
      - name: scope
        in: query
        description: Show recent apps at a group level or user level.
        schema:
          type: string
          enum:
          - group
          - user
          default: group
      - name: custom_id
        in: query
        description: Filter recently uploaded apps by custom ID. Accepted characters
          are A-Z, a-z, 0-9, ., -, _. All other characters are ignored. Character
          limit is 100.
        schema:
          type: string
          example: app_1
      - name: limit
        in: query
        description: Number of recent apps to be fetched. Default is 10.
        schema:
          type: number
          default: 10
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                required:
                - apps
                properties:
                  apps:
                    type: array
                    items:
                      $ref: '#/components/schemas/AppAutomateApp'
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
      x-response-transform: json-unwrap $.apps
  /app-automate/sessions/{sessionId}/terminallogs:
    post:
      tags:
      - AppAutomate
      summary: Upload terminal logs for your session.
      description: Upload terminal logs for your session.
      operationId: uploadAppAutomateSessionTerminalLogs
      x-request-transform:
