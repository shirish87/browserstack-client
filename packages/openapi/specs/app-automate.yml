  /app-automate/flutter-integration-tests/v2/ios/test-package:
    post:
      tags:
      - AppAutomate
      summary: Upload a Flutter test package for iOS
      description: Upload the application under test (AUT) for Flutter iOS testing
        in .zip format.
      operationId: uploadAppAutomateFlutteriOSApp
      x-request-transform:
        codec: multipart
        config:
          fileField: file
          filenameFrom: "$.file_name"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              title: UploadAppAutomateFlutteriOSAppRequest
              allOf:
              - type: object
                properties:
                  custom_id:
                    type: string
                    description: Custom ID for the app. Accepted characters are A-Z,
                      a-z, 0-9, ., -, _. All other characters are ignored. Character
                      limit is 100.
                    example: app_1
              - oneOf:
                - type: object
                  required:
                  - file
                  properties:
                    file:
                      type: string
                      format: binary
                      description: Path to the app file on your machine. Supported
                        file formats are .apk and .aab files for Android and .ipa
                        file for iOS
                - type: object
                  required:
                  - url
                  properties:
                    url:
                      type: string
                      description: URL of the app file. Ensure that its a publicly
                        accessible URL as BrowserStack will attempt to download the
                        app from this location. Supported file formats are .apk and
                        .aab files for Android and .ipa file for iOS
                      example: https://example.com/app.ipa
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppAutomateTestPackage'
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /app-automate/detox/v2/android/app-client:
    post:
      tags:
