    BrowserPlatform:
      title: BrowserPlatform
      allOf:
      - $ref: '#/components/schemas/Browser'
      - type: object
        required:
        - os
        - os_version
        properties:
          os:
            type: string
            example: Windows
          os_version:
            type: string
            example: '10'
          device:
            type: string
            example: null
          real_mobile:
            type: boolean
            example: null
    BrowserRealDevice:
      title: BrowserRealDevice
      allOf:
      - $ref: '#/components/schemas/Browser'
      - type: object
        required:
        - devices
        - real_devices
        properties:
          browser:
            type: string
            example: Android Browser
          devices:
            type: array
            items:
              type: string
            maxItems: 0
          real_devices:
            type: array
            items:
              type: string
              example: Google Pixel 6 Pro
    NewWorker:
      title: NewWorker
      allOf:
      - type: object
        required:
        - url
        - os
        - os_version
        properties:
          url:
            type: string
            description: URL to be opened in the browser
            example: https://www.google.com/ncr
          timeout:
            type: number
            description: 'Time in seconds before the worker is terminated. The default
              value is 300 seconds and the minimum value is 60 seconds. IMPORTANT:
              Irrespective of the timeout parameter, a browser worker is alive for
              a maximum time of 1800 seconds.'
            example: 300
          os:
            type: string
            description: Operating system name.
            example: Windows
          os_version:
            type: string
            description: Operating system version.
            example: '10'
          name:
            type: string
            description: Name of the worker.
            example: qunit-test-pricing
          build:
            type: string
            description: Name of the build the session is running under.
            example: staging-build
          project:
            type: string
            description: Name of the project the build is organized under.
            example: pricing-project
          browserstack.video:
            type: boolean
            description: Enable video recording for the session. The default value
              is false.
            example: true
          resolution:
            type: string
            description: Set the resolution of VM before the beginning of your test.
              Available for Desktop only. The default value is 1024x768.
            example: 1024x768
      - oneOf:
        - type: object
          required:
          - browser
          - browser_version
          properties:
            browser:
              type: string
              description: Browser name.
              example: Chrome
            browser_version:
              type: string
              description: Browser version.
              example: '80.0'
        - type: object
          properties:
            device:
              type: string
              description: Device name. If a device is not provided it defaults to
                the first device available for that os version.
              example: iPhone 11 Pro
            browser:
              type: string
              description: Browser name.
              example: Chrome
            browser_version:
              type: string
              description: Browser version.
              example: '80.0'
    Status:
      title: Status
      type: object
      required:
      - used_time
      - running_sessions
      - session_limit
      - total_available_time
      properties:
        used_time:
          type: number
          example: 10
        running_sessions:
          type: number
          example: 0
        session_limit:
          type: number
          example: 0
        total_available_time:
          type: string
          example: Unlimited Testing Time
    Worker:
      title: Worker
      allOf:
      - $ref: '#/components/schemas/BrowserPlatform'
      - type: object
        required:
        - id
        properties:
          id:
            type: number
            description: ID of the worker.
            example: 122326697
          sessionId:
            description: ID of the session.
            example: 550709149fe79e949363b581e774d5ebffa1b8fe
          status:
            type: string
            enum:
            - queue
            - running
            description: Current status of the worker.
            example: running
          browser_url:
            type: string
            description: Dashboard URL of the session
            example: ''
    AutomateBuild:
      title: AutomateBuild
      type: object
      required:
      - name
      - hashed_id
      - duration
      - status
      - build_tag
      - public_url
      properties:
        name:
          type: string
          description: Name of your build
          example: pricing_project_build
        duration:
          type: number
          description: Duration of build execution
          example: 10
        status:
          type: string
          enum:
          - running
          - timeout
          - failed
          - done
        user_id:
          type: number
          description: Identifier for the user
          example: 256454
        group_id:
          type: number
          description: Identifier for your account or group
          example: 2
        sub_group_id:
          type: number
          description: Identifier for a team in a group
          example: 0
        automation_project_id:
          type: number
          description: ID of your project
          example: 866256
        hashed_id:
          type: string
          description: Hashed ID of the build
          example: 4207442b2b0567368956dba064c22a3235a76214
        build_tag:
          type: string
          description: Tag for the build
          example: pricing_project_build
        public_url:
          type: string
          description: Public URL of the build
    AutomateProject:
      title: AutomateProject
      type: object
      required:
      - id
      - name
      - user_id
      - group_id
      - sub_group_id
      - created_at
      - updated_at
      properties:
        id:
          type: number
          description: ID of your project
          example: 866256
        name:
          type: string
          description: Name of your project
          example: pricing_project
        user_id:
          type: number
          description: Identifier for the user
          example: 256454
        group_id:
          type: number
          description: Identifier for your account or group
          example: 2
        sub_group_id:
          type: number
          description: Identifier for a team in a group
          example: 0
        created_at:
          type: string
          description: Time at which the project was created on BrowserStack servers
          example: '2020-03-11T10:14:36.000Z'
        updated_at:
          type: string
          description: Time at which the project was updated on BrowserStack servers
          example: '2020-09-18T09:45:57.000Z'
