servers:
  - url: "{scheme}://{host}{basePath}"
    variables:
      scheme:
        default: https
      host:
        default: api.browserstack.com
      basePath:
        default: "/5"
  - url: "{scheme}://{host}"
    variables:
      scheme:
        default: https
      host:
        default: api-cloud.browserstack.com

openapi: 3.0.2
info:
  title: BrowserStack Screenshots
  version: 5.0.0
  description: BrowserStack Screenshots API
  license:
    name: MIT License
    url: https://opensource.org/license/mit/

externalDocs:
  description: Find out more about BrowserStack
  url: https://www.browserstack.com/docs/


security:
  - basicAuth: []

paths:
  /screenshots/{jobId}.json:
    get:
      tags:
      - Screenshots
      summary: Fetches a screenshot job
      description: Fetches a screenshot job
      operationId: getScreenshotsJob
      parameters:
      - name: jobId
        in: path
        description: ID of your screenshot job
        required: true
        schema:
          type: string
          example: 13b93a14db22872fcb5fd1c86b730a51197db319
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScreenshotsJob'
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /screenshots:
    post:
      tags:
      - Screenshots
      summary: Take a screenshot
      description: Take a screenshot of a website on a particular browser
      operationId: createScreenshotsJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewScreenshot'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewScreenshotsJob'
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'
  /screenshots/browsers.json:
    get:
      tags:
      - Screenshots
      summary: Fetches list of browsers
      description: Fetches list of browsers supported by Screenshots API
      operationId: getScreenshotsBrowsers
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowserList'
        '400':
          $ref: '#/components/schemas/400.BadRequest'
        '401':
          $ref: '#/components/schemas/401.Unauthorized'
        '404':
          $ref: '#/components/schemas/404.NotFound'
        '422':
          $ref: '#/components/schemas/422.UnprocessableEntity'
        '500':
          $ref: '#/components/schemas/5xx.InternalServerError'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic

  schemas:
    400.BadRequest:
      description: Bad request.
    401.Unauthorized:
      description: Your BrowserStack access credentials are invalid.
    403.Forbidden:
      description: Authorized user is not the owner of the resource.
    404.NotFound:
      description: The requested resource could not be found.
    422.UnprocessableEntity:
      description: Request is well-formed but has semantic errors. The response will provide
        more details about error.
    5xx.InternalServerError:
      description: Indicates an error with BrowserStack servers.
    Browser:
      title: Browser
      type: object
      required:
      - browser
      - browser_version
      properties:
        browser:
          type: string
          example: Chrome
        browser_version:
          type: string
          example: '80.0'
    BrowserDevice:
      title: BrowserDevice
      allOf:
      - $ref: '#/components/schemas/Browser'
      - type: object
        required:
        - devices
        - real_devices
        properties:
          browser:
            type: string
            example: Android Browser
          devices:
            type: array
            items:
              type: string
              example: Google Nexus
          real_devices:
            type: array
            items:
              type: string
            maxItems: 0
    BrowserList:
      title: BrowserList
      type: array
      items:
        $ref: '#/components/schemas/BrowserPlatform'
    BrowserPlatform:
      title: BrowserPlatform
      allOf:
      - $ref: '#/components/schemas/Browser'
      - type: object
        required:
        - os
        - os_version
        properties:
          os:
            type: string
            example: Windows
          os_version:
            type: string
            example: '10'
          device:
            type: string
            example:
          real_mobile:
            type: boolean
            example:
    BrowserRealDevice:
      title: BrowserRealDevice
      allOf:
      - $ref: '#/components/schemas/Browser'
      - type: object
        required:
        - devices
        - real_devices
        properties:
          browser:
            type: string
            example: Android Browser
          devices:
            type: array
            items:
              type: string
            maxItems: 0
          real_devices:
            type: array
            items:
              type: string
              example: Google Pixel 6 Pro
    NewScreenshot:
      title: NewScreenshot
      type: object
      required:
      - browsers
      - url
      properties:
        browsers:
          type: array
          items:
            type: object
            required:
            - os
            - os_version
            properties:
              browser:
                type: string
                example: Chrome
              browser_version:
                type: string
                example: '80.0'
              os:
                type: string
                example: Windows
              os_version:
                type: string
                example: '10'
              device:
                type: string
                description: Required if you want to test on a mobile device.
                example:
        orientation:
          type: string
          enum:
          - portrait
          - landscape
          description: 'Screen orientation for a mobile device. Default: portrait'
        url:
          type: string
          example: https://nextjs-template.vercel.app/
        callback_url:
          type: string
          description: Public URL to which the screenshot will be posted.
        win_res:
          type: string
          description: 'Sceen resolution of the Windows machine. Values: 1024x768, 1280x1024.
            Default: 1024x768'
          example: 1024x768
        mac_res:
          type: string
          description: 'Sceen resolution of the Mac machine. Values: 1024x768, 1280x960,
            1280x1024, 1600x1200, 1920x1080. Default: 1024x768'
          example: 1024x768
        quality:
          type: string
          enum:
          - Compressed
          - Original
          description: 'Quality of the screenshot. Default: Compressed'
        local:
          type: boolean
          description: 'Set to true if URL is local and a Local Testing connection has
            been set up. Default: false'
        wait_time:
          type: number
          description: 'Time in seconds to wait before taking the screenshot. Default:
            5'
          example: 5
    NewScreenshotsJob:
      title: NewScreenshotsJob
      allOf:
      - $ref: '#/components/schemas/ScreenshotsJobBase'
      - type: object
        required:
        - job_id
        properties:
          job_id:
            type: string
            description: Unique identifier for the screenshot job.
            example: 4207442b2b0567368956dba064c22a3235a76214
    NewWorker:
      title: NewWorker
      allOf:
      - type: object
        required:
        - url
        - os
        - os_version
        properties:
          url:
            type: string
            description: URL to be opened in the browser
            example: https://www.google.com/ncr
          timeout:
            type: number
            description: 'Time in seconds before the worker is terminated. The default
              value is 300 seconds and the minimum value is 60 seconds. IMPORTANT: Irrespective
              of the timeout parameter, a browser worker is alive for a maximum time of
              1800 seconds.'
            example: 300
          os:
            type: string
            description: Operating system name.
            example: Windows
          os_version:
            type: string
            description: Operating system version.
            example: '10'
          name:
            type: string
            description: Name of the worker.
            example: qunit-test-pricing
          build:
            type: string
            description: Name of the build the session is running under.
            example: staging-build
          project:
            type: string
            description: Name of the project the build is organized under.
            example: pricing-project
          browserstack.video:
            type: boolean
            description: Enable video recording for the session. The default value is
              false.
            example: true
          resolution:
            type: string
            description: Set the resolution of VM before the beginning of your test. Available
              for Desktop only. The default value is 1024x768.
            example: 1024x768
      - oneOf:
        - type: object
          required:
          - browser
          - browser_version
          properties:
            browser:
              type: string
              description: Browser name.
              example: Chrome
            browser_version:
              type: string
              description: Browser version.
              example: '80.0'
        - type: object
          properties:
            device:
              type: string
              description: Device name. If a device is not provided it defaults to the
                first device available for that os version.
              example: iPhone 11 Pro
            browser:
              type: string
              description: Browser name.
              example: Chrome
            browser_version:
              type: string
              description: Browser version.
              example: '80.0'
    Screenshot:
      title: Screenshot
      allOf:
      - $ref: '#/components/schemas/ScreenshotBase'
      - oneOf:
        - type: object
          required:
          - device
          properties:
            device:
              type: string
              example: iPhone 4S (6.0)
            browser:
              type: string
              example: Chrome
            browser_version:
              type: string
              example: '80.0'
        - type: object
          required:
          - browser
          - browser_version
          properties:
            browser:
              type: string
              example: Chrome
            browser_version:
              type: string
              example: '80.0'
      - type: object
        properties:
          image_url:
            type: string
            description: URL to view the screenshot
            example: https://www.browserstack.com/screenshots/13b93a14db22872fcb5fd1c86b730a51197db319/winxp_ie_7.0.png
          thumb_url:
            type: string
            description: URL to view the thumbnail of the screenshot
            example: https://www.browserstack.com/screenshots/13b93a14db22872fcb5fd1c86b730a51197db319/thumb_winxp_ie_7.0.jpg
          created_at:
            type: string
            description: Timestamp at which the screenshot was taken
            example: 2013-03-14 16:25:45 UTC
    ScreenshotBase:
      title: ScreenshotBase
      type: object
      required:
      - id
      - state
      - url
      - os
      - os_version
      properties:
        id:
          type: string
          description: ID for the screenshot
          example: be9989892cbba9b9edc2c95f403050aa4996ac6a
        state:
          type: string
          enum:
          - processing
          - pending
          - done
          - failed
        url:
          type: string
          example: https://nextjs-template.vercel.app/
        os:
          type: string
          example: Windows
        os_version:
          type: string
          example: '10'
    ScreenshotsJob:
      title: ScreenshotsJob
      allOf:
      - $ref: '#/components/schemas/ScreenshotsJobBase'
      - type: object
        required:
        - id
        properties:
          id:
            type: string
            description: Unique identifier for the screenshot job.
            example: 4207442b2b0567368956dba064c22a3235a76214
          state:
            type: string
            enum:
            - queued_all
            - done
            description: State of the screenshot job.
            example: done
    ScreenshotsJobBase:
      title: ScreenshotsJobBase
      type: object
      properties:
        job_id:
          type: string
          description: Unique identifier for the screenshot job.
          example: 4207442b2b0567368956dba064c22a3235a76214
        callback_url:
          type: string
          description: Public URL to which the screenshot will be posted.
          example: https://callback.example.com
        win_res:
          type: string
          description: 'Sceen resolution of the Windows machine. Values: 1024x768, 1280x1024.
            Default: 1024x768'
          example: 1024x768
        mac_res:
          type: string
          description: 'Sceen resolution of the Mac machine. Values: 1024x768, 1280x960,
            1280x1024, 1600x1200, 1920x1080. Default: 1024x768'
          example: 1024x768
        quality:
          type: string
          enum:
          - Compressed
          - Original
          description: 'Quality of the screenshot. Default: Compressed'
        wait_time:
          type: number
          description: 'Time in seconds to wait before taking the screenshot. Default:
            5'
          example: 5
        orientation:
          type: string
          enum:
          - portrait
          - landscape
          description: 'Screen orientation for a mobile device. Default: portrait'
        screenshots:
          type: array
          items:
            $ref: '#/components/schemas/Screenshot'
    Status:
      title: Status
      type: object
      required:
      - used_time
      - running_sessions
      - session_limit
      - total_available_time
      properties:
        used_time:
          type: number
          example: 10
        running_sessions:
          type: number
          example: 0
        session_limit:
          type: number
          example: 0
        total_available_time:
          type: string
          example: Unlimited Testing Time
    Worker:
      title: Worker
      allOf:
      - $ref: '#/components/schemas/BrowserPlatform'
      - type: object
        required:
        - id
        properties:
          id:
            type: number
            description: ID of the worker.
            example: 122326697
          sessionId:
            type: string
            description: ID of the session.
            example: 550709149fe79e949363b581e774d5ebffa1b8fe
          status:
            type: string
            enum:
            - queue
            - running
            description: Current status of the worker.
            example: running
          browser_url:
            type: string
            description: Dashboard URL of the session
            example: ''
